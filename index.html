const calcTotal=(ch,r)=>{
  if(!ch||!r)return 0;
  const n=getNuits(r.arrivee,r.depart);
  const p=PENSIONS.find(x=>x.code===r.pension)||{supp:0};
  return(ch.prix+p.supp*(r.adultes||1))*n;
};

function Clock(){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);
  const h=now.getHours().toString().padStart(2,"0");
  const m=now.getMinutes().toString().padStart(2,"0");
  const s=now.getSeconds().toString().padStart(2,"0");
  return(<div style={{textAlign:"right"}}><div style={{fontVariantNumeric:"tabular-nums",fontSize:22,fontWeight:700,color:"#dde4ee",letterSpacing:2,lineHeight:1.1}}>{h}:{m}<span style={{animation:"pulse 1s infinite",color:"#7a8a9a"}}>:</span>{s}</div><div style={{fontSize:11,color:"#5a6e82"}}>{now.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</div></div>);
}

function Meteo(){
  return(<div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:6,padding:"6px 12px",fontSize:12}}><span style={{fontSize:18}}>{METEO_BASE.icon}</span><div><div style={{color:"#dde4ee",fontWeight:600}}>{METEO_BASE.t}°C</div><div style={{color:"#5a6e82",fontSize:10.5}}>{METEO_BASE.desc} · {METEO_BASE.ville}</div></div></div>);
}

function ModalOverlay({children,onClose}){
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:1000,padding:"28px 14px",overflowY:"auto"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>{children}</div>);
}
function MTitre({icon,title,onClose}){
  return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h3 style={{fontSize:15,color:"#dde4ee",fontWeight:600}}>{icon} {title}</h3><button style={{background:"transparent",border:"none",color:"#4a5e72",fontSize:17,lineHeight:1,cursor:"pointer"}} onClick={onClose}>x</button></div>);

const MOT_DE_PASSE_ENSEIGNANT="prof2024";
function EnseignantAcces({onAcces}){
  const[mdp,setMdp]=useState("");
  const[err,setErr]=useState(false);
  const[visible,setVisible]=useState(false);
  const tenter=()=>{if(mdp===MOT_DE_PASSE_ENSEIGNANT){onAcces();}else{setErr(true);setMdp("");setTimeout(()=>setErr(false),2000);}};
  if(!visible)return(<button style={{width:"100%",padding:"12px",fontSize:14,fontWeight:700,background:"linear-gradient(135deg,#2a6a3a,#1e5030)",color:"#7aefaa",border:"1px solid rgba(61,190,122,.4)",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={()=>setVisible(true)}>Acceder au parametrage</button>);
  return(<div><div style={{display:"flex",gap:6,marginBottom:6}}><input type="password" placeholder="Mot de passe enseignant" value={mdp} onChange={e=>{setMdp(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&tenter()} style={{...S.input,flex:1,background:"rgba(0,0,0,.3)",border:"1px solid "+(err?"#e05c5c":"rgba(61,190,122,.3)"),color:"#7aefaa"}}/><button onClick={tenter} style={{padding:"7px 14px",fontWeight:700,fontSize:13,background:"linear-gradient(135deg,#2a6a3a,#1e5030)",color:"#7aefaa",border:"1px solid rgba(61,190,122,.4)",borderRadius:6,cursor:"pointer"}}>ok</button></div>{err&&<div style={{fontSize:11,color:"#e05c5c",textAlign:"center"}}>Mot de passe incorrect</div>}<button onClick={()=>{setVisible(false);setMdp("");}} style={{background:"transparent",border:"none",color:"#2a5a3a",fontSize:10.5,cursor:"pointer",width:"100%",marginTop:4}}>Annuler</button></div>);
}

function LoginScreen({onLogin,onModeEnseignant}){
  const[login,setLogin]=useState("");
  const[mdp,setMdp]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const handleLogin=()=>{setErr("");setLoading(true);setTimeout(()=>{const user=STAFF.find(s=>s.login===login.toLowerCase()&&s.mdp===mdp);if(user){onLogin(user);}else{setErr("Identifiant ou mot de passe incorrect.");setLoading(false);}},800);};
  const handleKey=e=>{if(e.key==="Enter")handleLogin();};
  return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#06111f",backgroundImage:"radial-gradient(ellipse at 20% 50%,rgba(212,33,61,.08) 0%,transparent 55%)"}}>
    <div style={{padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,.05)"}}><NovotelLogo/><Meteo/></div>
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24,gap:24,flexWrap:"wrap"}}>
      <div style={{width:"min(300px,100%)"}}>
        <div style={{background:"rgba(16,36,20,.95)",border:"2px solid rgba(61,190,122,.35)",borderRadius:12,padding:"28px 24px",boxShadow:"0 8px 32px rgba(0,0,0,.4)"}}>
          <div style={{textAlign:"center",marginBottom:18}}><div style={{fontSize:28,marginBottom:8}}>🎓</div><div style={{fontSize:15,fontWeight:700,color:"#3dbe7a"}}>Mode Enseignant</div><div style={{fontSize:11.5,color:"#3a6a4a",marginTop:4,lineHeight:1.5}}>Personnalisez l hotel, le personnel,<br/>les chambres et les clients</div></div>
          <EnseignantAcces onAcces={onModeEnseignant}/>
          <div style={{marginTop:14,padding:"10px 12px",background:"rgba(0,0,0,.2)",borderRadius:6,fontSize:10.5,color:"#2a5a3a"}}>Acces protege par mot de passe enseignant.</div>
        </div>
      </div>
      <div style={{width:"min(380px,100%)"}}>
        <div style={{background:"rgba(12,22,36,.98)",border:"1px solid rgba(255,255,255,.09)",borderRadius:12,padding:"32px 32px 28px",boxShadow:"0 24px 60px rgba(0,0,0,.5)"}}>
          <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:12,color:"#5a6e82",textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Connexion reception</div><h2 style={{fontSize:18,color:"#dde4ee",fontWeight:600}}>Acces PMS</h2></div>
          <div style={{marginBottom:12}}><Lbl>Identifiant</Lbl><Inp placeholder="ex : reception1" value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={handleKey} style={{background:"rgba(255,255,255,.04)"}}/></div>
          <div style={{marginBottom:18}}><Lbl>Mot de passe</Lbl><Inp type="password" placeholder="hotel2024" value={mdp} onChange={e=>setMdp(e.target.value)} onKeyDown={handleKey} style={{background:"rgba(255,255,255,.04)"}}/></div>
          {err&&<div style={{fontSize:12,color:"#e05c5c",marginBottom:12,textAlign:"center"}}>{err}</div>}
          <button style={{...S.btnPrim,width:"100%",padding:"11px",fontSize:13,opacity:loading?.6:1,borderRadius:7}} onClick={handleLogin} disabled={loading}>{loading?<span style={{display:"inline-block",width:14,height:14,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",verticalAlign:"middle"}}/>:"Se connecter"}</button>
          <div style={{marginTop:18,padding:"10px 12px",background:"rgba(74,159,212,.06)",border:"1px solid rgba(74,159,212,.12)",borderRadius:5}}>
            <div style={{fontSize:9.5,color:"#4a9fd4",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:.7}}>Comptes de demonstration</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>{STAFF.filter(s=>!s.hidden).map(s=>(<div key={s.login} style={{fontSize:10.5,color:"#3a5a6a",cursor:"pointer",padding:"3px 6px",borderRadius:3,background:"rgba(255,255,255,.02)"}} onClick={()=>{setLogin(s.login);setMdp(s.mdp);}}><span style={{color:"#6a9ab0",fontWeight:600}}>{s.login}</span><span style={{color:"#2a4050"}}> / {s.mdp}</span><span style={{color:RL[s.role],marginLeft:3,fontSize:9}}>{s.role==="directeur"?"DIR":s.role==="manager"?"MGR":"REC"}</span></div>))}</div>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:12,fontSize:10.5,color:"#1e2e3e"}}>© {new Date().getFullYear()} {CONFIG.copyright.auteur} — {CONFIG.copyright.lycee}</div>
      </div>
    </div>
  </div>);
}

function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[chambres,setChambres]=useState(CHAMBRES_INIT);
  const[clients,setClients]=useState(CLIENTS_INIT);
  const[resas,setResas]=useState(RESERVATIONS_INIT);
  const[modal,setModal]=useState(null);
  const[notif,setNotif]=useState(null);
  const[reclamations,setReclamations]=useState([]);
  const[examActif,setExamActif]=useState(false);
  const[scoreExamen,setScoreExamen]=useState({reservation:false,acompte:false,checkin:false,reclamation:false,checkout:false});
  const[scenario,setScenario]=useState(null);
  const[tempsRestant,setTempsRestant]=useState(0);
  const intervalRef=useRef(null);
  const[hotelConfig,setHotelConfig]=useState({...CONFIG.hotel});
  const[couleur,setCouleur]=useState(CONFIG.couleur);
  const urgent=tempsRestant<300&&tempsRestant>0;

  const notify=(msg,type="ok")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3400);};

  const terminerExamen=()=>{
    clearInterval(intervalRef.current);
    setExamActif(false);
    setTab("examen");
  };

  useEffect(()=>{
    const RECLAMATIONS_AUTO=[
      {type:"Proprete chambre",urgence:"haute",description:"Le client signale que la salle de bain n a pas ete nettoyee correctement."},
      {type:"Bruit / nuisances",urgence:"moyenne",description:"Plainte de bruit provenant de la chambre voisine depuis 30 minutes."},
      {type:"Equipements defectueux",urgence:"moyenne",description:"La television ne fonctionne plus depuis ce matin."},
      {type:"Restauration",urgence:"faible",description:"Room service commande il y a 45 minutes, toujours pas arrive."},
      {type:"Facturation incorrecte",urgence:"haute",description:"Le client conteste un montant sur sa note — mini-bar non consomme facture."},
      {type:"Bruit / nuisances",urgence:"haute",description:"Plainte urgente : bruit excessif, autres clients se plaignent depuis 1 heure."},
      {type:"Equipements defectueux",urgence:"faible",description:"La climatisation fait un bruit anormal depuis hier soir."},
      {type:"Proprete chambre",urgence:"moyenne",description:"Des draps taches retrouves lors du service de couverture."},
      {type:"Accueil / service",urgence:"faible",description:"Client mecontent de l attente a la reception lors de son arrivee."},
      {type:"Equipements defectueux",urgence:"moyenne",description:"Le coffre-fort est bloque, le client ne peut plus l ouvrir."},
    ];
    const interval=setInterval(()=>{
      const resasEnCours=resas.filter(x=>x.statut==="en cours");
      if(resasEnCours.length===0)return;
      const resaAleatoire=resasEnCours[Math.floor(Math.random()*resasEnCours.length)];
      const r=RECLAMATIONS_AUTO[Math.floor(Math.random()*RECLAMATIONS_AUTO.length)];
      const newR={...r,id:"AUTO"+Date.now(),clientId:resaAleatoire.clientId,chambreId:resaAleatoire.chambreId,date:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),statut:"en cours",auteur:"Systeme automatique"};
      setReclamations(p=>[newR,...p]);
      setNotif({msg:"Nouvelle reclamation — "+r.type+" ("+r.urgence+")",type:"err"});
      setTimeout(()=>setNotif(null),15000);
    },10*60*1000);
    return()=>clearInterval(interval);
  },[]);

  const getCh=id=>chambres.find(c=>c.id===id);
  const getCl=id=>clients.find(c=>c.id===id);
  const canStats=user&&(user.role==="manager"||user.role==="directeur");

  const checkin=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    setModal({type:"fichePolice",data:{resa:r,client:getCl(r.clientId),chambre:getCh(r.chambreId)}});
  };

  const confirmCheckin=id=>{
    if(examActif)setScoreExamen(p=>({...p,checkin:true}));
    const r=resas.find(x=>x.id===id);if(!r)return;
    setChambres(p=>p.map(c=>c.id===r.chambreId?{...c,statut:"occupée"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"en cours"}:x));
    setModal({type:"confirmationCheckin",data:{chambreId:r.chambreId,client:getCl(r.clientId)}});
    notify("Check-in — Chambre "+r.chambreId+" ("+getCl(r.clientId)?.nom+")","ok");
  };

  const checkout=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    setModal({type:"checkoutFacture",data:{resa:r,client:getCl(r.clientId),chambre:getCh(r.chambreId)}});
  };

  const confirmCheckout=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    const chambreId=r.chambreId;
    setChambres(p=>p.map(c=>c.id===chambreId?{...c,statut:"libre"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"terminée"}:x));
    setModal({type:"confirmationCheckout",data:{chambreId,client:getCl(r.clientId)}});
    notify("Check-out — Chambre "+chambreId+" liberee","ok");
    if(examActif)setScoreExamen(p=>({...p,checkout:true}));
  };

  const annuler=id=>{
    const r=resas.find(x=>x.id===id);
    if(!r||!window.confirm("Annuler la reservation "+r.numero+" ?"))return;
    if(r.statut==="en cours")setChambres(p=>p.map(c=>c.id===r.chambreId?{...c,statut:"libre"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"annulée"}:x));
    notify("Reservation "+r.numero+" annulee","err");
  };

  const addResa=data=>{
    const num="2024-"+String(resas.length+1).padStart(3,"0");
    const ch=getCh(data.chambreId);
    const totalTTC=calcTotal(ch,data)*(1+HOTEL.tva);
    const acompteMontant=Math.round(totalTTC*(data.acomptePercent||0)/100);
    const newR={...data,id:"R"+String(resas.length+1).padStart(3,"0"),numero:num,statut:"confirmée",acompte:acompteMontant,acomptePercent:data.acomptePercent||0};
    setResas(p=>[...p,newR]);
    setChambres(p=>p.map(c=>c.id===data.chambreId?{...c,statut:"réservée"}:c));
    setModal(null);
    notify("Reservation "+num+" creee","ok");
    if(examActif){
      setScoreExamen(p=>({...p,reservation:true}));
      if((data.acomptePercent||0)>0)setScoreExamen(p=>({...p,acompte:true}));
    }
  };

  const addClient=data=>{
    const newC={...data,id:"C"+String(clients.length+1).padStart(3,"0"),fidelite:"Bronze",sejours:0};
    setClients(p=>[...p,newC]);setModal(null);
    notify("Client "+data.nom+" "+data.prenom+" cree","ok");
  };

  const updateNote=(id,note)=>{setResas(p=>p.map(x=>x.id===id?{...x,notes:note}:x));setModal(null);notify("Demande speciale mise a jour","ok");};
  const updateStatutChambre=(cid,statut)=>{setChambres(p=>p.map(c=>c.id===cid?{...c,statut}:c));notify("Chambre "+cid+" => "+statut,"ok");};

  if(!user)return <LoginScreen onLogin={u=>{setUser(u);setTab("dashboard");}} onModeEnseignant={()=>{const dir=STAFF.find(s=>s.role==="directeur");if(dir){setUser(dir);setTab("parametrage");}}}/>;

  const arrivees=resas.filter(r=>r.arrivee===fmt(today)&&r.statut!=="annulée");
  const departs=resas.filter(r=>r.depart===fmt(today)&&r.statut!=="annulée");
  const enCours=resas.filter(r=>r.statut==="en cours").length;
  const libres=chambres.filter(c=>c.statut==="libre").length;
  const taux=Math.round(chambres.filter(c=>c.statut==="occupée"||c.statut==="réservée").length/chambres.length*100);

  const TABS=[
    {id:"dashboard",icon:"⊞",label:"Tableau de bord",roles:["receptionniste","manager","directeur"]},
    {id:"resas",icon:"◷",label:"Reservations",roles:["receptionniste","manager","directeur"]},
    {id:"chambres",icon:"⊡",label:"Chambres",roles:["receptionniste","manager","directeur"]},
    {id:"clients",icon:"◉",label:"Clients",roles:["receptionniste","manager","directeur"]},
    {id:"planning",icon:"📅",label:"Planning",roles:["receptionniste","manager","directeur"]},
    {id:"reclamations",icon:"📢",label:"Reclamations",roles:["receptionniste","manager","directeur"]},
    {id:"examen",icon:"🎓",label:"Mode Examen",roles:["receptionniste","manager","directeur"]},
    {id:"stats",icon:"◈",label:"Statistiques",roles:["manager","directeur"]},
    {id:"cloture",icon:"⊟",label:"Cloture du jour",roles:["manager","directeur"]},
    {id:"parametrage",icon:"⚙",label:"Parametrage",roles:["directeur"]},
  ].filter(t=>t.roles.includes(user.role));

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#07121f"}}>
      {examActif&&scenario&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9998,background:urgent?"rgba(180,20,20,.97)":"rgba(0,30,60,.97)",borderBottom:"2px solid "+(urgent?"#e05c5c":"#D4213D"),padding:"8px 24px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#aaccee",textTransform:"uppercase",letterSpacing:1}}>EXAMEN EN COURS</div>
          <div style={{fontSize:11,color:"#7aaccc"}}>{scenario.titre}</div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:6}}>
              {[{k:"reservation",label:"Resa"},{k:"acompte",label:"Acompte"},{k:"checkin",label:"CI"},{k:"reclamation",label:"Recla."},{k:"checkout",label:"CO"}].map(t=>(
                <div key={t.k} style={{fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:600,background:scoreExamen[t.k]?"rgba(61,190,122,.2)":"rgba(255,255,255,.08)",color:scoreExamen[t.k]?"#3dbe7a":"#4a5e72",border:"1px solid "+(scoreExamen[t.k]?"rgba(61,190,122,.4)":"rgba(255,255,255,.1)")}}>{scoreExamen[t.k]?"ok":""} {t.label}</div>
              ))}
            </div>
            <div style={{fontSize:13,fontWeight:700,color:"#dde4ee"}}>{Object.values(scoreExamen).filter(Boolean).length}/{Object.keys(scoreExamen).length} pts</div>
            <div style={{fontSize:20,fontWeight:700,color:urgent?"#e05c5c":"#3dbe7a",fontVariantNumeric:"tabular-nums",letterSpacing:2}}>{String(Math.floor(tempsRestant/60)).padStart(2,"0")}:{String(tempsRestant%60).padStart(2,"0")}</div>
            <button style={{...S.btnGhost,fontSize:11,color:"#e05c5c",borderColor:"rgba(224,92,92,.3)"}} onClick={terminerExamen}>Terminer</button>
          </div>
        </div>
      )}
      {notif&&(<div style={{position:"fixed",top:examActif&&scenario?54:14,right:16,zIndex:9999,background:notif.type==="ok"?"#0a2018":"#230a0a",border:"1px solid "+(notif.type==="ok"?"#3dbe7a":"#e05c5c")+"40",borderLeft:"3px solid "+(notif.type==="ok"?"#3dbe7a":"#e05c5c"),borderRadius:7,padding:"10px 18px",fontSize:13,fontWeight:500,color:notif.type==="ok"?"#3dbe7a":"#e05c5c",boxShadow:"0 4px 20px rgba(0,0,0,.4)",animation:"fadeIn .25s ease",maxWidth:360}}>{notif.msg}</div>)}
      <header className="no-print" style={{background:"rgba(8,18,30,.97)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"0 24px",display:"flex",alignItems:"center",height:58,gap:16,flexShrink:0,marginTop:examActif&&scenario?46:0}}>
        <HotelLogo hotel={hotelConfig} couleur={couleur} compact/>
        <div style={{width:1,height:28,background:"rgba(255,255,255,.08)"}}/>
        <Meteo/>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:16}}>
          <Clock/>
          <div style={{width:1,height:28,background:"rgba(255,255,255,.08)"}}/>
          <div style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer"}} onClick={()=>window.confirm("Se deconnecter ?")&&setUser(null)}>
            <Avatar initials={user.avatar} color={RL[user.role]} size={30}/>
            <div><div style={{fontSize:12,color:"#dde4ee",fontWeight:500,lineHeight:1.2}}>{user.nom}</div><div style={{fontSize:10.5}}>{badge(RL[user.role],user.poste)}</div></div>
          </div>
        </div>
      </header>
      <nav className="no-print" style={{background:"rgba(8,15,26,.9)",borderBottom:"1px solid rgba(255,255,255,.05)",padding:"0 20px",display:"flex",gap:0,flexShrink:0,overflowX:"auto"}}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 16px",background:"transparent",border:"none",borderBottom:tab===t.id?"2px solid #D4213D":"2px solid transparent",color:tab===t.id?"#dde4ee":"#4a5e72",fontSize:12,fontWeight:tab===t.id?600:400,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><span style={{fontSize:13}}>{t.icon}</span> {t.label}</button>))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",fontSize:11,color:"#2a3a4a",paddingRight:4}}>Shift : {user.shift}</div>
      </nav>
      <main style={{flex:1,padding:"20px 24px",overflowY:"auto",animation:"fadeIn .3s ease"}}>
        {tab==="dashboard"&&<Dashboard resas={resas} chambres={chambres} clients={clients} arrivees={arrivees} departs={departs} enCours={enCours} taux={taux} libres={libres} user={user} onCheckin={checkin} onCheckout={checkout} onFacture={r=>setModal({type:"facture",data:r})} onNote={r=>setModal({type:"note",data:r})} getCh={getCh} getCl={getCl}/>}
        {tab==="resas"&&<Reservations resas={resas} chambres={chambres} clients={clients} onNew={()=>setModal({type:"newResa"})} onCheckin={checkin} onCheckout={checkout} onAnnuler={annuler} onFacture={r=>setModal({type:"facture",data:r})} onNote={r=>setModal({type:"note",data:r})} getCh={getCh} getCl={getCl}/>}
        {tab==="chambres"&&<Chambres chambres={chambres} resas={resas} clients={clients} onSelect={c=>setModal({type:"chambre",data:c})}/>}
        {tab==="clients"&&<ClientsTab clients={clients} resas={resas} onNew={()=>setModal({type:"newClient"})}/>}
        {tab==="planning"&&<PlanningTab chambres={chambres} resas={resas} getCl={getCl}/>}
        {tab==="reclamations"&&<Reclamations resas={resas} clients={clients} getCl={getCl} getCh={getCh} user={user} reclamations={reclamations} setReclamations={setReclamations} examActif={examActif} setScoreExamen={setScoreExamen}/>}

function Reservations({resas,chambres,clients,onNew,onCheckin,onCheckout,onAnnuler,onFacture,onNote,getCh,getCl}){
  const[filtre,setFiltre]=useState("tout");
  const[search,setSearch]=useState("");
  const filtered=useMemo(()=>resas.filter(r=>{const cl=getCl(r.clientId);const ok=search===""||((cl?.nom+" "+cl?.prenom).toLowerCase().includes(search.toLowerCase())||r.chambreId.includes(search)||r.numero.includes(search));return ok&&(filtre==="tout"||r.statut===filtre);}),[resas,filtre,search]);

    <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <Inp style={{width:240}} placeholder="Client, chambre, numero..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{[["tout","Toutes"],["confirmée","Confirmees"],["en cours","En cours"],["terminée","Terminees"],["annulée","Annulees"]].map(([v,l])=>(<button key={v} style={{...S.btnGhost,color:filtre===v?"#dde4ee":"#4a5e72",borderColor:filtre===v?"rgba(212,33,61,.5)":"rgba(255,255,255,.08)",background:filtre===v?"rgba(212,33,61,.08)":"transparent"}} onClick={()=>setFiltre(v)}>{l}</button>))}</div>
    </div>
    <div style={S.card}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:720}}><thead><tr>{["N° Resa","Client","Chambre","Arrivee","Depart","Nuits","Pension","Total","Note","Statut","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
    {filtered.map(r=>{const cl=getCl(r.clientId);const ch=getCh(r.chambreId);const n=getNuits(r.arrivee,r.depart);const tot=calcTotal(ch,r);const hasNote=r.notes&&r.notes.trim();return(<tr key={r.id}>
      <td style={S.td}><code style={{color:"#D4213D",fontSize:11}}>{r.numero}</code></td>
      <td style={S.td}><div style={{fontWeight:500}}>{cl?.nom} {cl?.prenom}</div>{cl?.fidelite&&<span>{badge(FC[cl.fidelite]||"#888",cl.fidelite)}</span>}</td>
      <td style={S.td}><b style={{color:"#D4213D"}}>{r.chambreId}</b><div style={{fontSize:10.5,color:"#4a5e72"}}>{ch?.type}</div></td>
      <td style={S.td}>{fmtDate(r.arrivee)}</td>
      <td style={S.td}>{fmtDate(r.depart)}</td>
      <td style={S.td}>{n}n</td>
      <td style={S.td}>{r.pension}</td>
      <td style={S.td}><b style={{color:"#dde4ee"}}>{tot>0?fmtEuro(tot*(1.1)):"—"}</b></td>
      <td style={S.td}><button onClick={()=>onNote(r)} style={{background:hasNote?"rgba(232,160,48,.12)":"rgba(255,255,255,.04)",border:"1px solid "+(hasNote?"rgba(232,160,48,.35)":"rgba(255,255,255,.08)"),borderRadius:4,padding:"3px 8px",cursor:"pointer",color:hasNote?"#e8a030":"#3a5060",fontSize:13,lineHeight:1}}>{hasNote?"!":"+"}</button></td>
      <td style={S.td}>{badge(SR[r.statut],r.statut)}</td>
      <td style={S.td}>
        {r.statut==="confirmée"&&r.arrivee<=fmt(today)&&<button style={S.btnAcc} onClick={()=>onCheckin(r.id)}>CI</button>}
        {r.statut==="en cours"&&<button style={{...S.btnGhost,color:"#e05c5c",borderColor:"rgba(224,92,92,.25)",marginRight:4}} onClick={()=>onCheckout(r.id)}>CO</button>}
        <button style={{...S.btnGhost,fontSize:11,marginRight:4}} onClick={()=>onFacture(r)}>Fact.</button>
        {(r.statut==="confirmée"||r.statut==="en cours")&&<button style={{...S.btnGhost,color:"#e05c5c",fontSize:11}} onClick={()=>onAnnuler(r.id)}>X</button>}
      </td>
    </tr>);})}
    {filtered.length===0&&<tr><td colSpan={11} style={{...S.td,textAlign:"center",color:"#2a3a4a",padding:28}}>Aucune reservation trouvee</td></tr>}
    </tbody></table></div></div>
  </div>);
}

function Chambres({chambres,resas,clients,onSelect}){
  const[ftType,setFtType]=useState("tout");

function Reclamations({resas,clients,getCl,getCh,user,reclamations,setReclamations,examActif,setScoreExamen}){
  const[modal,setModal]=useState(null);
  const[modalRec,setModalRec]=useState(null);
  const TYPES=["Proprete chambre","Bruit / nuisances","Equipements defectueux","Facturation incorrecte","Accueil / service","Restauration","Autre"];
  const URGENCES=[{v:"faible",c:"#3dbe7a",label:"Faible"},{v:"moyenne",c:"#e8a030",label:"Moyenne"},{v:"haute",c:"#e05c5c",label:"Haute"}];
  const addReclamation=data=>{const newR={...data,id:"REC"+String(reclamations.length+1).padStart(3,"0"),date:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),statut:"en cours",auteur:user.nom};setReclamations(p=>[newR,...p]);setModal(null);};
  const confirmerResolution=(id,traitement,reponse)=>{const heureResolution=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});setReclamations(p=>p.map(r=>r.id===id?{...r,statut:"résolue",traitement,reponse,heureResolution}:r));setModalRec(null);if(examActif)setScoreExamen(p=>({...p,reclamation:true}));};
  const recEnCours=reclamations.find(r=>r.id===modalRec);
  const clientsEnSejour=resas.filter(r=>r.statut==="en cours");
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}><h2 style={{fontSize:16,color:"#dde4ee",fontWeight:600}}>Reclamations clients <span style={{fontSize:11,color:"#4a5e72",fontWeight:400,marginLeft:10}}>— {reclamations.length} reclamation(s)</span></h2><button style={S.btnPrim} onClick={()=>setModal("new")}>+ Nouvelle reclamation</button></div>
    {reclamations.length===0?(<div style={{...S.card,textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:12}}>ok</div><div style={{fontSize:14,color:"#3dbe7a",fontWeight:600}}>Aucune reclamation en cours</div></div>):(
      <div style={S.card}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["N°","Client","Chambre","Type","Urgence","Heure","Auteur","Statut",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
      {reclamations.map(r=>{const cl=getCl(r.clientId);const urgence=URGENCES.find(u=>u.v===r.urgence);return(<tr key={r.id}>
        <td style={S.td}><code style={{color:"#D4213D",fontSize:11}}>{r.id}</code></td>
        <td style={S.td}><b>{cl?.nom}</b> {cl?.prenom}</td>
        <td style={S.td}><b style={{color:"#D4213D"}}>{r.chambreId}</b></td>
        <td style={S.td}><span style={{fontSize:11}}>{r.type}</span></td>
        <td style={S.td}>{badge(urgence?.c||"#888",urgence?.label||r.urgence)}</td>
        <td style={S.td}><span style={{fontSize:11,color:"#4a5e72"}}>{r.date}</span></td>
        <td style={S.td}><span style={{fontSize:11}}>{r.auteur}</span></td>
        <td style={S.td}>{badge(r.statut==="résolue"?"#3dbe7a":"#e8a030",r.statut)}</td>
        <td style={S.td}>{r.statut==="en cours"&&<button style={{...S.btnGhost,fontSize:11,color:"#3dbe7a",borderColor:"rgba(61,190,122,.3)"}} onClick={()=>setModalRec(r.id)}>Traiter</button>}{r.statut==="résolue"&&r.reponse&&<div style={{fontSize:10,color:"#3dbe7a",maxWidth:180,fontStyle:"italic"}}>{r.traitement?.split(" ").slice(0,4).join(" ")}...</div>}</td>
      </tr>);})}
      </tbody></table></div>
    )}
    {modalRec&&recEnCours&&(<ModalOverlay onClose={()=>setModalRec(null)}><TraitementReclamationModal reclamation={recEnCours} client={getCl(recEnCours.clientId)} onConfirmer={(t,r)=>confirmerResolution(modalRec,t,r)} onClose={()=>setModalRec(null)}/></ModalOverlay>)}
    {modal==="new"&&(<ModalOverlay onClose={()=>setModal(null)}><NouvelleReclamationModal clients={clientsEnSejour.map(r=>({...getCl(r.clientId),chambreId:r.chambreId,resaId:r.id}))} types={TYPES} urgences={URGENCES} onSave={addReclamation} onClose={()=>setModal(null)}/></ModalOverlay>)}
  </div>);
}

function ModeExamen({resas,chambres,clients,getCl,getCh,user,reclamations,setReclamations,examActif,setExamActif,scoreExamen,setScoreExamen,scenario,setScenario,tempsRestant,setTempsRestant,intervalRef,terminerExamen,notify}){
  const[phase,setPhase]=useState(examActif?"examen":"accueil");
  const score=scoreExamen;
  const totalScore=Object.values(score).filter(Boolean).length;
  const maxScore=Object.keys(score).length;

  const demarrerExamen=(sc)=>{
    setScenario(sc);
    setTempsRestant(sc.duree*60);
    setScoreExamen({reservation:false,checkin:false,reclamation:false,checkout:false,acompte:false});
    setPhase("examen");
    setExamActif(true);
    const reclaAuto={...sc.reclamation,id:"EXAM"+Date.now(),clientId:"C001",chambreId:"201",date:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),statut:"en cours",auteur:"Systeme — Scenario examen"};
    setReclamations(p=>[reclaAuto,...p]);
    if(notify)notify("Reclamation — "+sc.reclamation.type+" ("+sc.reclamation.urgence+") — Onglet Reclamations","err");
    clearInterval(intervalRef.current);
    intervalRef.current=setInterval(()=>{
      setTempsRestant(t=>{
        if(t<=1){clearInterval(intervalRef.current);setExamActif(false);setPhase("rapport");return 0;}
        return t-1;
      });
    },1000);
  };

  const terminerExamenLocal=()=>{terminerExamen();setPhase("rapport");};

  if(phase==="accueil")return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h2 style={{fontSize:16,color:"#dde4ee",fontWeight:600}}>Mode Examen</h2></div>
    <div style={{background:"rgba(212,33,61,.06)",border:"1px solid rgba(212,33,61,.2)",borderRadius:8,padding:"14px 18px",marginBottom:20,fontSize:12,color:"#e8a030"}}>Duree : 20 minutes — 5 taches a realiser — Score sur 5 points</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      {SCENARIOS_EXAMEN.map(sc=>(<div key={sc.id} style={{background:"rgba(12,22,36,.9)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"18px 20px"}}>
        <div style={{fontSize:14,fontWeight:600,color:"#dde4ee",marginBottom:8}}>Scenario {sc.id}</div>
        <div style={{fontSize:13,color:"#D4213D",fontWeight:500,marginBottom:10}}>{sc.titre}</div>
        <div style={{fontSize:11,color:"#4a5e72",marginBottom:4}}>Client : <b style={{color:"#dde4ee"}}>{sc.client.nom} {sc.client.prenom}</b></div>
        <div style={{fontSize:11,color:"#e8c870",fontStyle:"italic",marginBottom:14}}>« {sc.besoins} »</div>
        <button style={{...S.btnPrim,width:"100%"}} onClick={()=>demarrerExamen(sc)}>Demarrer ce scenario</button>
      </div>))}
    </div>
  </div>);

  if(phase==="examen")return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,background:"rgba(12,22,36,.9)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"14px 20px"}}>
      <div><div style={{fontSize:11,color:"#4a5e72",marginBottom:2}}>SCENARIO EN COURS</div><div style={{fontSize:14,fontWeight:600,color:"#dde4ee"}}>{scenario.titre}</div></div>
      <div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:700,color:"#3dbe7a",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{String(Math.floor(tempsRestant/60)).padStart(2,"0")}:{String(tempsRestant%60).padStart(2,"0")}</div></div>
      <div style={{textAlign:"right"}}><div style={{fontSize:24,fontWeight:700,color:"#dde4ee"}}>{totalScore}/{maxScore}</div><div style={{fontSize:10,color:"#4a5e72"}}>Points</div></div>
    </div>
    <div style={{...S.card,marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Mission</div>
      <div style={{fontSize:12,color:"#e8c870",fontStyle:"italic",marginBottom:12}}>« {scenario.besoins} »</div>
    </div>

        {k:"checkin",n:"3",label:"Realiser le check-in",detail:"Remplir la fiche de police complete"},

        {k:"checkout",n:"5",label:"Realiser le check-out",detail:"Valider la facture et le paiement"},

        <div><div style={{fontSize:12,color:score[t.k]?"#4a5e72":"#dde4ee",textDecoration:score[t.k]?"line-through":"none"}}>{t.label}</div><div style={{fontSize:10.5,color:"#4a5e72"}}>{t.detail}</div></div>
        {score[t.k]&&<span style={{marginLeft:"auto",fontSize:11,color:"#3dbe7a"}}>Valide</span>}
      </div>))}
    </div>

      <div style={{fontSize:11,fontWeight:700,color:"#e8a030",marginBottom:6}}>Reclamation a traiter — {scenario.reclamation.type} ({scenario.reclamation.urgence})</div>
      <div style={{fontSize:12,color:"#e8c870",fontStyle:"italic"}}>« {scenario.reclamation.description} »</div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={{...S.btnPrim,background:"#3dbe7a"}} onClick={terminerExamenLocal}>Terminer</button></div>
  </div>);

  if(phase==="rapport")return(<div>
    <div style={{textAlign:"center",marginBottom:24}}>
      <div style={{fontSize:48,marginBottom:8}}>{totalScore>=4?"🏆":totalScore>=3?"🥈":"🥉"}</div>
      <h2 style={{fontSize:20,color:"#dde4ee",fontWeight:600,marginBottom:4}}>Resultat de l examen</h2>
      <div style={{fontSize:14,color:"#4a5e72"}}>{scenario.titre}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
      {[
        {v:totalScore+"/"+maxScore,l:"Score total",c:totalScore>=4?"#3dbe7a":totalScore>=3?"#e8a030":"#e05c5c"},
        {v:Math.round(totalScore/maxScore*100)+"%",l:"Taux de reussite",c:"#4a9fd4"},
        {v:Math.floor((scenario.duree*60-tempsRestant)/60)+"min",l:"Temps utilise",c:"#a07ad4"},
      ].map(k=>(<div key={k.l} style={{background:"rgba(12,22,36,.9)",border:"1px solid "+k.c+"18",borderLeft:"3px solid "+k.c,borderRadius:6,padding:"14px 16px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:k.c}}>{k.v}</div><div style={{fontSize:11,color:"#4a5e72",marginTop:4}}>{k.l}</div></div>))}
    </div>
    <div style={S.card}>
      <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Detail des competences</div>
      {[
        {k:"reservation",label:"Creation de reservation"},
        {k:"acompte",label:"Encaissement acompte"},
        {k:"checkin",label:"Check-in fiche de police"},
        {k:"reclamation",label:"Gestion reclamation"},
        {k:"checkout",label:"Check-out facture"},
      ].map(t=>(<div key={t.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}><span style={{fontSize:12,color:"#dde4ee"}}>{t.label}</span><span style={{fontSize:12,fontWeight:600,color:score[t.k]?"#3dbe7a":"#e05c5c"}}>{score[t.k]?"Valide":"Non realise"}</span></div>))}
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><button style={S.btnGhost} onClick={()=>setPhase("accueil")}>Retour</button><button style={S.btnPrim} onClick={()=>window.print()}>Imprimer</button></div>
  </div>);

  return null;
}

function Stats({resas,chambres,clients,getCh,getCl,user}){
  const revChart=useRef(null);const occChart=useRef(null);const typeChart=useRef(null);
  const revChartInst=useRef(null);const occChartInst=useRef(null);const typeChartInst=useRef(null);
  const moisLabels=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];
  const currentMonth=today.getMonth();
  const revenusMensuels=[18500,16200,22400,28600,34200,48900,72400,68300,41200,29800,19400,15600];
  const tauxMensuels=[52,48,62,71,78,88,97,95,74,65,55,45];
  const revCurrentCalc=resas.filter(r=>r.statut!=="annulée").reduce((s,r)=>{const ch=getCh(r.chambreId);return s+calcTotal(ch,r)*(1+0.10);},0);
  const revData=[...revenusMensuels];revData[currentMonth]=Math.max(revCurrentCalc,revData[currentMonth]);
  const typeCount={};chambres.forEach(c=>{typeCount[c.type]=(typeCount[c.type]||0)+1;});
  const topClients=useMemo(()=>clients.map(c=>({...c,totalRevenu:resas.filter(r=>r.clientId===c.id&&r.statut!=="annulée").reduce((s,r)=>{const ch=getCh(r.chambreId);return s+calcTotal(ch,r)*(1.1);},0)})).sort((a,b)=>b.totalRevenu-a.totalRevenu).slice(0,5),[clients,resas,getCh]);
  const totalTTC=resas.filter(r=>r.statut!=="annulée"&&r.statut!=="confirmée").reduce((s,r)=>{const ch=getCh(r.chambreId);return s+calcTotal(ch,r)*(1.1);},0);
  useEffect(()=>{if(!revChart.current)return;if(revChartInst.current)revChartInst.current.destroy();revChartInst.current=new Chart(revChart.current,{type:"bar",data:{labels:moisLabels,datasets:[{label:"Revenus TTC",data:revData,backgroundColor:revData.map((_,i)=>i===currentMonth?"rgba(212,33,61,.85)":"rgba(255,255,255,.08)"),borderColor:revData.map((_,i)=>i===currentMonth?"#D4213D":"rgba(255,255,255,.15)"),borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11}}},y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11},callback:v=>(v/1000).toFixed(0)+"k€"}}}}});return()=>{if(revChartInst.current)revChartInst.current.destroy();};},[]);
  useEffect(()=>{if(!occChart.current)return;if(occChartInst.current)occChartInst.current.destroy();occChartInst.current=new Chart(occChart.current,{type:"line",data:{labels:moisLabels,datasets:[{label:"Taux d occupation %",data:tauxMensuels,borderColor:"#4a9fd4",backgroundColor:"rgba(74,159,212,.08)",fill:true,tension:0.4,pointBackgroundColor:tauxMensuels.map((_,i)=>i===currentMonth?"#D4213D":"#4a9fd4"),pointRadius:tauxMensuels.map((_,i)=>i===currentMonth?5:3)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11}}},y:{min:0,max:100,grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11},callback:v=>v+"%"}}}}});return()=>{if(occChartInst.current)occChartInst.current.destroy();};},[]);
  useEffect(()=>{if(!typeChart.current)return;if(typeChartInst.current)typeChartInst.current.destroy();typeChartInst.current=new Chart(typeChart.current,{type:"doughnut",data:{labels:Object.keys(typeCount),datasets:[{data:Object.values(typeCount),backgroundColor:["rgba(212,33,61,.7)","rgba(74,159,212,.7)","rgba(61,190,122,.7)","rgba(232,160,48,.7)"],borderColor:"rgba(0,0,0,.3)",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#7a8a9a",font:{size:11},padding:10}}}}});return()=>{if(typeChartInst.current)typeChartInst.current.destroy();};},[]);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}><h2 style={{fontSize:16,color:"#dde4ee",fontWeight:600}}>Statistiques <span style={{fontSize:11,color:"#4a5e72",fontWeight:400,marginLeft:10}}>— Acces {user.role}</span></h2></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:18}}>
      {[{v:fmtEuro(totalTTC),l:"CA TTC encaisse",c:"#3dbe7a"},{v:tauxMensuels[currentMonth]+"%",l:"Taux occupation mensuel",c:"#D4213D"},{v:resas.filter(r=>r.statut!=="annulée").length,l:"Reservations actives",c:"#4a9fd4"},{v:resas.filter(r=>{const ch=getCh(r.chambreId);return ch&&ch.prix>=199&&r.statut!=="annulée";}).length,l:"Sejours Suite/Prestige",c:"#a07ad4"}].map(k=>(<div key={k.l} style={{background:"rgba(12,22,36,.9)",border:"1px solid "+k.c+"18",borderLeft:"3px solid "+k.c,borderRadius:6,padding:"14px 16px"}}><div style={{fontSize:22,fontWeight:700,color:"#dde4ee",lineHeight:1.2}}>{k.v}</div><div style={{fontSize:11,color:"#4a5e72",marginTop:2}}>{k.l}</div></div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14,marginBottom:14}}>
      <div style={S.card}><div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Revenus mensuels</div><div style={{height:200}}><canvas ref={revChart}/></div></div>
      <div style={S.card}><div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Repartition par type</div><div style={{height:200}}><canvas ref={typeChart}/></div></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"2fr 3fr",gap:14}}>
      <div style={S.card}><div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Taux occupation 12 mois</div><div style={{height:180}}><canvas ref={occChart}/></div></div>
      <div style={S.card}><div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Top clients</div>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["#","Client","Fidelite","Sejours","CA TTC"].map(h=><th key={h} style={{...S.th,fontSize:10}}>{h}</th>)}</tr></thead><tbody>
        {topClients.map((c,i)=>(<tr key={c.id}><td style={S.td}><span style={{fontSize:13,fontWeight:700,color:i===0?"#d4a830":i===1?"#a8a8c0":i===2?"#cd7f32":"#4a5e72"}}>{i+1}</span></td><td style={S.td}><b>{c.nom}</b> {c.prenom}</td><td style={S.td}>{badge(FC[c.fidelite]||"#888",c.fidelite)}</td><td style={S.td}>{c.sejours}</td><td style={S.td}><b style={{color:"#3dbe7a"}}>{fmtEuro(c.totalRevenu)}</b></td></tr>))}
        </tbody></table>
      </div>
    </div>
  </div>);
}

function NewResaModal({clients,chambres,resas,onSave,onClose}){
  const[form,setForm]=useState({clientId:clients[0]?.id||"",chambreId:"",arrivee:fmt(today),depart:fmt(addDays(today,1)),adultes:2,enfants:0,pension:"SA",notes:"",acompte:0,acomptePercent:null});
  const[disponibles,setDisponibles]=useState([]);const[searched,setSearched]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const chercher=()=>{const arr=new Date(form.arrivee);const dep=new Date(form.depart);const avail=chambres.filter(c=>{if(c.statut==="maintenance")return false;return!resas.some(r=>{if(r.chambreId!==c.id||r.statut==="annulée"||r.statut==="terminée")return false;return arr<new Date(r.depart)&&dep>new Date(r.arrivee);});});setDisponibles(avail);setSearched(true);set("chambreId","");};
  const n=getNuits(form.arrivee,form.depart);
  const ch=chambres.find(c=>c.id===form.chambreId);
  const pen=PENSIONS.find(p=>p.code===form.pension)||{supp:0};
  const ht=ch&&n>0?(ch.prix+pen.supp*form.adultes)*n:0;
  const ttc=ht*(1+HOTEL.tva);
  const canSave=form.clientId&&form.chambreId&&n>0&&form.acomptePercent!==null;
  return(<div style={{background:"#0b1c2e",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:26,width:"min(540px,92vw)"}}>
    <MTitre icon="◷" title="Nouvelle reservation" onClose={onClose}/>
    <div style={{marginBottom:12}}><Lbl>Client *</Lbl><Sel value={form.clientId} onChange={e=>set("clientId",e.target.value)}>{clients.map(c=><option key={c.id} value={c.id}>{c.nom} {c.prenom} — {c.profil||""} ({c.fidelite})</option>)}</Sel></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
      <div><Lbl>Arrivee *</Lbl><Inp type="date" value={form.arrivee} min={fmt(today)} onChange={e=>{set("arrivee",e.target.value);setSearched(false);}}/></div>
      <div><Lbl>Depart *</Lbl><Inp type="date" value={form.depart} min={form.arrivee||fmt(today)} onChange={e=>{set("depart",e.target.value);setSearched(false);}}/></div>
    </div>
    {n>0&&<div style={{fontSize:12,color:"#D4213D",marginBottom:12}}>→ {n} nuit(s)</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <div><Lbl>Adultes</Lbl><Inp type="number" min="1" max="6" value={form.adultes} onChange={e=>set("adultes",+e.target.value)}/></div>
      <div><Lbl>Enfants</Lbl><Inp type="number" min="0" max="4" value={form.enfants} onChange={e=>set("enfants",+e.target.value)}/></div>
    </div>
    <button style={{...S.btnGhost,width:"100%",padding:"9px",marginBottom:12,textAlign:"center",fontSize:12}} onClick={chercher}>Verifier les disponibilites</button>
    {searched&&<div style={{marginBottom:12}}><Lbl>Chambre disponible * ({disponibles.length})</Lbl>
      {disponibles.length===0?<p style={{color:"#e05c5c",fontSize:12}}>Aucune chambre disponible pour ces dates.</p>:<div style={{display:"flex",flexWrap:"wrap",gap:7}}>
        {disponibles.map(c=>(<div key={c.id} onClick={()=>set("chambreId",c.id)} style={{padding:"7px 12px",borderRadius:5,cursor:"pointer",fontSize:12,border:"1px solid "+(form.chambreId===c.id?"#D4213D":"rgba(255,255,255,.1)"),background:form.chambreId===c.id?"rgba(212,33,61,.1)":"rgba(255,255,255,.03)"}}><b style={{color:"#D4213D"}}>{c.id}</b> — {c.type}<div style={{fontSize:10,color:"#4a5e72"}}>{c.vue} · {c.literie} · {c.prix}€/nuit</div></div>))}
      </div>}
    </div>}
    <div style={{marginBottom:12}}><Lbl>Formule pension</Lbl><Sel value={form.pension} onChange={e=>set("pension",e.target.value)}>{PENSIONS.map(p=><option key={p.code} value={p.code}>{p.label}{p.supp>0?" (+"+p.supp+"€/pers/j)":""}</option>)}</Sel></div>
    <div style={{marginBottom:12}}><Lbl>Notes / Demandes speciales</Lbl><Inp placeholder="Ex : chambre calme, anniversaire..." value={form.notes} onChange={e=>set("notes",e.target.value)}/></div>
    {ch&&ht>0&&<div style={{marginBottom:12}}>
      <Lbl>Acompte a l encaissement (%)</Lbl>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>{[0,20,30,50,100].map(p=>(<button key={p} type="button" style={{...S.btnGhost,fontSize:11,padding:"4px 10px",background:form.acomptePercent===p?"rgba(212,33,61,.12)":"transparent",color:form.acomptePercent===p?"#D4213D":"#4a5e72",borderColor:form.acomptePercent===p?"rgba(212,33,61,.4)":"rgba(255,255,255,.08)"}} onClick={()=>set("acomptePercent",p)}>{p===0?"Sans acompte":p+"%"}</button>))}</div>
      {form.acomptePercent>0&&<div style={{fontSize:12,color:"#e8a030",marginTop:6}}>Acompte : <b>{fmtEuro(ttc*form.acomptePercent/100)}</b> — Solde a l arrivee : <b>{fmtEuro(ttc*(1-form.acomptePercent/100))}</b></div>}
    </div>}
    {ch&&ht>0&&(<div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:6,padding:"10px 14px",marginBottom:14,fontSize:12}}>
      <Ligne l={"Hebergement ch. "+ch.id+" x "+n+"n"} v={ch.prix*n+"€"}/>
      {pen.supp>0&&<Ligne l={pen.label+" x "+form.adultes+"p x "+n+"n"} v={pen.supp*form.adultes*n+"€"}/>}
      <div style={{borderTop:"1px solid rgba(255,255,255,.06)",marginTop:6,paddingTop:6}}><Ligne l="Total HT" v={ht.toFixed(2)+"€"}/><Ligne l={"TVA "+(HOTEL.tva*100).toFixed(0)+"%"} v={(ht*HOTEL.tva).toFixed(2)+"€"}/><Ligne l="TOTAL TTC" v={fmtEuro(ttc)} gold bold/></div>
    </div>)}
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.btnGhost} onClick={onClose}>Annuler</button><button style={{...S.btnPrim,opacity:canSave?1:.4}} disabled={!canSave} onClick={()=>canSave&&onSave(form)}>Confirmer</button></div>
  </div>);
}

function FactureModal({resa,chambre,client,hotel,onClose,onCheckout=null}){
  if(!resa||!chambre||!client)return null;
  const H=hotel||HOTEL;
  const n=getNuits(resa.arrivee,resa.depart);
  const pen=PENSIONS.find(p=>p.code===resa.pension)||{supp:0,label:resa.pension};

    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:12}}><thead><tr>{["Designation","Qte","P.U. HT","Total HT"].map(h=><th key={h} style={{...S.th,textAlign:h==="Designation"?"left":"right",fontSize:9.5}}>{h}</th>)}</tr></thead><tbody>
      <tr><td style={S.td}>Hebergement — Ch. {chambre.id} {chambre.type}<br/><span style={{fontSize:10,color:"#4a5e72"}}>{fmtDate(resa.arrivee)} => {fmtDate(resa.depart)} · {resa.adultes} adulte(s)</span></td><td style={{...S.td,textAlign:"right"}}>{n}n</td><td style={{...S.td,textAlign:"right"}}>{chambre.prix}€</td><td style={{...S.td,textAlign:"right"}}>{hebergt}€</td></tr>
      {pensTotal>0&&<tr><td style={S.td}>{pen.label}<br/><span style={{fontSize:10,color:"#4a5e72"}}>{resa.adultes||1} pers x {n}n</span></td><td style={{...S.td,textAlign:"right"}}>{(resa.adultes||1)*n}</td><td style={{...S.td,textAlign:"right"}}>{pen.supp}€</td><td style={{...S.td,textAlign:"right"}}>{pensTotal}€</td></tr>}
    </tbody></table>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:5,padding:"10px 14px",marginBottom:18}}>
      <Ligne l="Total HT" v={ht.toFixed(2)+" €"}/><Ligne l={"TVA "+(H.tva*100).toFixed(0)+"%"} v={tvaAmt.toFixed(2)+" €"}/>
      <div style={{borderTop:"1px solid rgba(255,255,255,.07)",marginTop:6,paddingTop:6}}><Ligne l="TOTAL TTC" v={fmtEuro(ttc)} gold bold/></div>
    </div>
    {resa.acompte>0&&(<div style={{background:"rgba(61,190,122,.06)",border:"1px solid rgba(61,190,122,.2)",borderRadius:6,padding:"10px 14px",marginBottom:14}}><div style={{fontSize:11,fontWeight:600,color:"#3dbe7a",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Reglement</div><Ligne l="Acompte verse a la reservation" v={fmtEuro(resa.acompte)}/><Ligne l="Solde restant du" v={fmtEuro(ttc-resa.acompte)} bold gold/></div>)}

    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
      <button style={S.btnGhost} onClick={onClose}>Fermer</button>
      {onCheckout&&<button style={{...S.btnPrim,background:"#3dbe7a",marginLeft:8}} onClick={onCheckout}>Valider le paiement et Check-out</button>}
      <button style={S.btnPrim} onClick={()=>window.print()}>Imprimer</button>

            <td style={S.td}><Sel value={c.type} style={{minWidth:110}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],type:e.target.value};setChambresList(l);}}>{TYPES_CH.map(t=><option key={t}>{t}</option>)}</Sel></td>
            <td style={S.td}><Inp type="number" value={c.etage} style={{width:46}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],etage:+e.target.value};setChambresList(l);}}/></td>
            <td style={S.td}><Sel value={c.literie} style={{minWidth:100}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],literie:e.target.value};setChambresList(l);}}>{LITERIES.map(t=><option key={t}>{t}</option>)}</Sel></td>
            <td style={S.td}><Inp type="number" value={c.cap} style={{width:46}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],cap:+e.target.value};setChambresList(l);}}/></td>
            <td style={S.td}><Inp type="number" value={c.prix} style={{width:62}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],prix:+e.target.value};setChambresList(l);}}/></td>
            <td style={S.td}><Sel value={c.vue} style={{minWidth:90}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],vue:e.target.value};setChambresList(l);}}>{VUES.map(t=><option key={t}>{t}</option>)}</Sel></td>
            <td style={S.td}><Sel value={c.statut} style={{minWidth:100}} onChange={e=>{const l=[...chambresList];l[i]={...l[i],statut:e.target.value};setChambresList(l);}}>{STATUTS_CH.map(t=><option key={t}>{t}</option>)}</Sel></td>
            <td style={S.td}><Inp value={(c.equip||[]).join(", ")} style={{minWidth:140}} placeholder="Wi-Fi, TV, Clim..." onChange={e=>{const l=[...chambresList];l[i]={...l[i],equip:e.target.value.split(",").map(x=>x.trim()).filter(Boolean)};setChambresList(l);}}/></td>
            <td style={S.td}><button style={{...S.btnGhost,color:"#e05c5c",fontSize:11,marginRight:0}} onClick={()=>setChambresList(p=>p.filter((_,j)=>j!==i))}>X</button></td>
          </tr>))}
          </tbody></table></div>
          <SaveBtn saved={saved==="chambres"} onClick={()=>save("chambres",chambresList,onUpdateChambres)}/>
        </div>)}
        {section==="clients"&&(<div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><SectionTitle icon="📋" title={"Clients de depart ("+clientsList.length+")"}/><button style={S.btnPrim} onClick={()=>setClientsList(p=>[...p,{id:"C"+String(p.length+1).padStart(3,"0"),nom:"NOM",prenom:"Prenom",email:"email@exemple.fr",tel:"",ville:"Paris",pays:"France",fidelite:"Bronze",sejours:0,profil:"",besoins:""}])}>+ Ajouter</button></div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}><thead><tr>{["ID","Nom","Prenom","Email","Tel","Ville","Pays","Fidelite","Sejours",""].map(h=><th key={h} style={{...S.th,fontSize:10}}>{h}</th>)}</tr></thead><tbody>
          {clientsList.map((c,i)=>(<tr key={i}><td style={S.td}><code style={{color:"#D4213D",fontSize:10.5}}>{c.id}</code></td><td style={S.td}><Inp value={c.nom} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],nom:e.target.value.toUpperCase()};setClientsList(l);}}/></td><td style={S.td}><Inp value={c.prenom} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],prenom:e.target.value};setClientsList(l);}}/></td><td style={S.td}><Inp value={c.email} style={{minWidth:130}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],email:e.target.value};setClientsList(l);}}/></td><td style={S.td}><Inp value={c.tel} style={{minWidth:110}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],tel:e.target.value};setClientsList(l);}}/></td><td style={S.td}><Inp value={c.ville} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],ville:e.target.value};setClientsList(l);}}/></td><td style={S.td}><Inp value={c.pays} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],pays:e.target.value};setClientsList(l);}}/></td><td style={S.td}><Sel value={c.fidelite} onChange={e=>{const l=[...clientsList];l[i]={...l[i],fidelite:e.target.value};setClientsList(l);}}>{FIDELITES.map(f=><option key={f}>{f}</option>)}</Sel></td><td style={S.td}><Inp type="number" min="0" value={c.sejours} style={{width:54}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],sejours:+e.target.value};setClientsList(l);}}/></td><td style={S.td}><button style={{...S.btnGhost,color:"#e05c5c",fontSize:11,marginRight:0}} onClick={()=>setClientsList(p=>p.filter((_,j)=>j!==i))}>X</button></td></tr>))}
          </tbody></table></div>
          <SaveBtn saved={saved==="clients"} onClick={()=>save("clients",clientsList,onUpdateClients)}/>
        </div>)}
      </div>
    </div>
  </div>);
}

/* FIREBASE AUTH */
function FirebaseLoginScreen({onAuthenticated}){
  const[email,setEmail]=useState("");
  const[mdp,setMdp]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const handleLogin=async()=>{setErr("");setLoading(true);try{await firebase.auth().signInWithEmailAndPassword(email,mdp);onAuthenticated();}catch(e){setErr("Identifiant ou mot de passe incorrect.");setLoading(false);}};
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#06111f",backgroundImage:"radial-gradient(ellipse at 20% 50%,rgba(212,33,61,.08) 0%,transparent 55%)"}}>
    <div style={{width:"min(380px,92vw)",background:"rgba(12,22,36,.98)",border:"1px solid rgba(255,255,255,.09)",borderRadius:12,padding:"36px 32px",boxShadow:"0 24px 60px rgba(0,0,0,.5)"}}>
      <div style={{textAlign:"center",marginBottom:28}}><div style={{fontSize:32,marginBottom:8}}>🏨</div><div style={{fontSize:11,color:"#5a6e82",textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>PMS Pedagogique</div><h2 style={{fontSize:17,color:"#dde4ee",fontWeight:600}}>Acces securise</h2><div style={{fontSize:11,color:"#3a5060",marginTop:4}}>Lycee Victor Hugo — Carpentras</div></div>
      <div style={{marginBottom:12}}><Lbl>Email</Lbl><Inp type="email" placeholder="votre@email.fr" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{background:"rgba(255,255,255,.04)"}}/></div>
      <div style={{marginBottom:18}}><Lbl>Mot de passe</Lbl><Inp type="password" placeholder="••••••••" value={mdp} onChange={e=>setMdp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{background:"rgba(255,255,255,.04)"}}/></div>
      {err&&<div style={{fontSize:12,color:"#e05c5c",marginBottom:12,textAlign:"center"}}>{err}</div>}
      <button style={{...S.btnPrim,width:"100%",padding:11,fontSize:13,borderRadius:7,opacity:loading?.6:1}} onClick={handleLogin} disabled={loading}>{loading?<span style={{display:"inline-block",width:14,height:14,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",verticalAlign:"middle"}}/>:"Se connecter"}</button>
      <div style={{marginTop:20,fontSize:10.5,color:"#1e2e3e",textAlign:"center"}}>© {new Date().getFullYear()} Yannick Otto — Lycee Victor Hugo, Carpentras</div>
    </div>
  </div>);
}

function FirebaseApp(){
  const[fbUser,setFbUser]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{const unsub=firebase.auth().onAuthStateChanged(u=>{setFbUser(u);setLoading(false);});return unsub;},[]);
  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#06111f"}}><div style={{width:24,height:24,border:"3px solid rgba(212,33,61,.3)",borderTopColor:"#D4213D",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>);
  if(!fbUser)return <FirebaseLoginScreen onAuthenticated={()=>{}}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<FirebaseApp/>);
</script>
