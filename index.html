const calcTotal=(ch,r)=>{
  if(!ch||!r)return 0;
  const n=getNuits(r.arrivee,r.depart);
  const p=PENSIONS.find(x=>x.code===r.pension)||{supp:0};
  return(ch.prix+p.supp*(r.adultes||1))*n;
};

/* ══════════════════════════════════════════════════════
   MOT DE PASSE MODE ENSEIGNANT
══════════════════════════════════════════════════════ */
const MOT_DE_PASSE_ENSEIGNANT = "prof2024"; // ← modifiable ici

function EnseignantAcces({onAcces}){
  const[mdp,setMdp]=useState("");
  const[err,setErr]=useState(false);
  const[visible,setVisible]=useState(false);

  const tenter=()=>{
    if(mdp===MOT_DE_PASSE_ENSEIGNANT){onAcces();}
    else{setErr(true);setMdp("");setTimeout(()=>setErr(false),2000);}
  };

  if(!visible) return(
    <button
      style={{
        width:"100%",padding:"12px",fontSize:14,fontWeight:700,
        background:"linear-gradient(135deg,#2a6a3a,#1e5030)",
        color:"#7aefaa",border:"1px solid rgba(61,190,122,.4)",
        borderRadius:8,cursor:"pointer",letterSpacing:.5,
        display:"flex",alignItems:"center",justifyContent:"center",gap:8
      }}
      onClick={()=>setVisible(true)}>
      ⚙ Accéder au paramétrage
    </button>
  );

  return(
    <div style={{animation:"fadeIn .2s ease"}}>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input
          type="password"
          placeholder="Mot de passe enseignant"
          value={mdp}
          onChange={e=>{setMdp(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&tenter()}
          autoFocus
          style={{...S.input,flex:1,
            background:"rgba(0,0,0,.3)",
            border:`1px solid ${err?"#e05c5c":"rgba(61,190,122,.3)"}`,
            color:"#7aefaa"}}
        />
        <button
          onClick={tenter}
          style={{
            padding:"7px 14px",fontWeight:700,fontSize:13,
            background:"linear-gradient(135deg,#2a6a3a,#1e5030)",
            color:"#7aefaa",border:"1px solid rgba(61,190,122,.4)",
            borderRadius:6,cursor:"pointer"
          }}>→</button>
      </div>
      {err&&(
        <div style={{fontSize:11,color:"#e05c5c",textAlign:"center",animation:"fadeIn .2s ease"}}>
          Mot de passe incorrect
        </div>
      )}
      <button onClick={()=>{setVisible(false);setMdp("");}}
        style={{background:"transparent",border:"none",color:"#2a5a3a",
          fontSize:10.5,cursor:"pointer",width:"100%",marginTop:4}}>
        Annuler
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════

function App(){
  const[user,setUser]=useState(null);

  const[chambres,setChambres]=useState(CHAMBRES_INIT);
  const[clients,setClients]=useState(CLIENTS_INIT);
  const[resas,setResas]=useState(RESERVATIONS_INIT);

  const[notif,setNotif]=useState(null);
  const[reclamations,setReclamations]=useState([]);
  const[hotelConfig,setHotelConfig]=useState({...CONFIG.hotel});
  const[couleur,setCouleur]=useState(CONFIG.couleur);

  const canStats=user&&(user.role==="manager"||user.role==="directeur");
  const canAdmin=user&&user.role==="directeur";

  const notify=(msg,type="ok")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3400);};
  useEffect(()=>{
    const RECLAMATIONS_AUTO=[
      {type:"Propreté chambre",urgence:"haute",description:"Le client signale que la salle de bain n'a pas été nettoyée correctement."},
      {type:"Bruit / nuisances",urgence:"moyenne",description:"Plainte de bruit provenant de la chambre voisine depuis 30 minutes."},
      {type:"Équipements défectueux",urgence:"moyenne",description:"La télévision ne fonctionne plus depuis ce matin."},
      {type:"Restauration",urgence:"faible",description:"Room service commandé il y a 45 minutes, toujours pas arrivé."},
      {type:"Facturation incorrecte",urgence:"haute",description:"Le client conteste un montant sur sa note — mini-bar non consommé facturé."},
      {type:"Bruit / nuisances",urgence:"haute",description:"Plainte urgente : bruit excessif, autres clients se plaignent depuis 1 heure."},
      {type:"Équipements défectueux",urgence:"faible",description:"La climatisation fait un bruit anormal depuis hier soir."},
      {type:"Propreté chambre",urgence:"moyenne",description:"Des draps tachés retrouvés lors du service de couverture."},
      {type:"Accueil / service",urgence:"faible",description:"Client mécontent de l'attente à la réception lors de son arrivée."},
      {type:"Équipements défectueux",urgence:"moyenne",description:"Le coffre-fort est bloqué, le client ne peut plus l'ouvrir."},
    ];
    const interval=setInterval(()=>{
      const resasEnCours=resas.filter(x=>x.statut==="en cours");
      if(resasEnCours.length===0)return;
      const resaAleatoire=resasEnCours[Math.floor(Math.random()*resasEnCours.length)];
      const r=RECLAMATIONS_AUTO[Math.floor(Math.random()*RECLAMATIONS_AUTO.length)];
      const newR={
        ...r,
        id:`AUTO${Date.now()}`,
        clientId:resaAleatoire.clientId,
        chambreId:resaAleatoire.chambreId,
        date:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
        statut:"en cours",
        auteur:"Système automatique"
      };
      setReclamations(p=>[newR,...p]);
      setNotif({msg:`📢 Nouvelle réclamation — ${r.type} (${r.urgence})`,type:"err"});
     setTimeout(()=>setNotif(null),15000);
 },30*1000);
    return()=>clearInterval(interval);
  },[]);

  const getCh=id=>chambres.find(c=>c.id===id);
  const getCl=id=>clients.find(c=>c.id===id);

  const checkin=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    const cl=getCl(r.clientId);
    const ch=getCh(r.chambreId);
setModal({type:"fichePolice",data:{resa:r,client:cl,chambre:ch}});
  };
const confirmCheckin=(id,fichePolice)=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    setChambres(p=>p.map(c=>c.id===r.chambreId?{...c,statut:"occupée"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"en cours"}:x));
    setModal({type:"confirmationCheckin",data:{chambreId:r.chambreId,client:getCl(r.clientId)}});
    notify(`✓ Check-in — Chambre ${r.chambreId} (${getCl(r.clientId)?.nom})`,"ok");
  };
 const checkout=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    const cl=getCl(r.clientId);
    const ch=getCh(r.chambreId);
    setModal({type:"checkoutFacture",data:{resa:r,client:cl,chambre:ch}});
  };
const confirmCheckout=id=>{
    const r=resas.find(x=>x.id===id);if(!r)return;
    const cl=getCl(r.clientId);
    const chambreId=r.chambreId;
    setChambres(p=>p.map(c=>c.id===chambreId?{...c,statut:"libre"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"terminée"}:x));
    setModal({type:"confirmationCheckout",data:{chambreId,client:cl}});
    notify(`↩ Check-out — Chambre ${chambreId} libérée`,"ok");
  };
  const annuler=id=>{
    const r=resas.find(x=>x.id===id);
    if(!r||!window.confirm(`Annuler la réservation ${r.numero} ?`))return;
    if(r.statut==="en cours")setChambres(p=>p.map(c=>c.id===r.chambreId?{...c,statut:"libre"}:c));
    setResas(p=>p.map(x=>x.id===id?{...x,statut:"annulée"}:x));
    notify(`Réservation ${r.numero} annulée`,"err");
  };
 const addResa=data=>{
    const num=`2024-${String(resas.length+1).padStart(3,"0")}`;
    const ch=getCh(data.chambreId);
    const totalTTC=calcTotal(ch,data)*(1+HOTEL.tva);
    const acompteMontant=Math.round(totalTTC*(data.acomptePercent||0)/100);
    const newR={...data,id:`R${String(resas.length+1).padStart(3,"0")}`,numero:num,statut:"confirmée",acompte:acompteMontant,acomptePercent:data.acomptePercent||0};
    setResas(p=>[...p,newR]);
    setChambres(p=>p.map(c=>c.id===data.chambreId?{...c,statut:"réservée"}:c));
    setModal(null);notify(`Réservation ${num} créée`,"ok");
  };
  const addClient=data=>{
    const newC={...data,id:`C${String(clients.length+1).padStart(3,"0")}`,fidelite:"Bronze",sejours:0};
    setClients(p=>[...p,newC]);setModal(null);
    notify(`Client ${data.nom} ${data.prenom} créé`,"ok");

  const updateNote=(id,note)=>{
    setResas(p=>p.map(x=>x.id===id?{...x,notes:note}:x));
    setModal(null);
    notify("Demande spéciale mise à jour","ok");
  };
  const updateStatutChambre=(cid,statut)=>{
    setChambres(p=>p.map(c=>c.id===cid?{...c,statut}:c));
    notify(`Chambre ${cid} → ${statut}`,"ok");
  };

  if(!user)return <LoginScreen
    onLogin={u=>{setUser(u);setTab("dashboard");}}
    onModeEnseignant={()=>{
      const dir=STAFF.find(s=>s.role==="directeur");
      if(dir){setUser(dir);setTab("parametrage");}

  />;
  const arrivees=resas.filter(r=>r.arrivee===fmt(today)&&r.statut!=="annulée");
  const departs=resas.filter(r=>r.depart===fmt(today)&&r.statut!=="annulée");

  const libres=chambres.filter(c=>c.statut==="libre").length;

    {id:"dashboard",icon:"⊞",label:"Tableau de bord",roles:["receptionniste","manager","directeur"]},
    {id:"resas",icon:"◷",label:"Réservations",roles:["receptionniste","manager","directeur"]},
    {id:"chambres",icon:"⊡",label:"Chambres",roles:["receptionniste","manager","directeur"]},
    {id:"clients",icon:"◉",label:"Clients",roles:["receptionniste","manager","directeur"]},
 {id:"stats",icon:"◈",label:"Statistiques",roles:["manager","directeur"]},
{id:"cloture",icon:"⊟",label:"Clôture du jour",roles:["manager","directeur"]},
{id:"planning",icon:"📅",label:"Planning",roles:["receptionniste","manager","directeur"]},
{id:"reclamations",icon:"📢",label:"Réclamations",roles:["receptionniste","manager","directeur"]},

            <button key={v} style={{...S.btnGhost,color:filtre===v?"#dde4ee":"#4a5e72",
              borderColor:filtre===v?"rgba(212,33,61,.5)":"rgba(255,255,255,.08)",
              background:filtre===v?"rgba(212,33,61,.08)":"transparent"}}
              onClick={()=>setFiltre(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={S.card}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:720}}>
            <thead><tr>{["N° Résa","Client","Chambre","Arrivée","Départ","Nuits","Pension","Total","Note","Statut","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>

                  <b style={{color:"#D4213D"}}>{r.chambreId}</b>
                  <div style={{fontSize:10.5,color:"#4a5e72"}}>{ch?.type}</div>

                    style={{background:hasNote?"rgba(232,160,48,.12)":"rgba(255,255,255,.04)",
                      border:`1px solid ${hasNote?"rgba(232,160,48,.35)":"rgba(255,255,255,.08)"}`,
                      borderRadius:4,padding:"3px 8px",cursor:"pointer",

  const revenusMensuels=[18500,16200,22400,28600,34200,48900,72400,68300,41200,29800,19400,15600];

  },0);
  const revData=[...revenusMensuels];
  revData[currentMonth]=Math.max(revCurrentCalc,revData[currentMonth]);

  /* Répartition par type de chambre */
  const typeCount={};
  chambres.forEach(c=>{typeCount[c.type]=(typeCount[c.type]||0)+1;});

  /* Top clients */
  const topClients=useMemo(()=>{
    return clients.map(c=>({
      ...c,
      totalRevenu:resas.filter(r=>r.clientId===c.id&&r.statut!=="annulée").reduce((s,r)=>{
        const ch=getCh(r.chambreId);return s+calcTotal(ch,r)*(1.1);
      },0)
    })).sort((a,b)=>b.totalRevenu-a.totalRevenu).slice(0,5);
  },[clients,resas,getCh]);

  /* Montants globaux */
  const totalTTC=resas.filter(r=>r.statut!=="annulée"&&r.statut!=="confirmée").reduce((s,r)=>{
    const ch=getCh(r.chambreId);return s+calcTotal(ch,r)*(1.1);
  },0);
  const nResasActives=resas.filter(r=>r.statut!=="annulée").length;
  const pmHotel=nResasActives>0?(totalTTC/nResasActives):0;
  const revuePremium=resas.filter(r=>{const ch=getCh(r.chambreId);return ch&&ch.prix>=199&&r.statut!=="annulée";}).length;

  /* Chart revenus */
  useEffect(()=>{
    if(!revChart.current)return;
    if(revChartInst.current)revChartInst.current.destroy();
    revChartInst.current=new Chart(revChart.current,{
      type:"bar",
      data:{
        labels:moisLabels,
        datasets:[{
          label:"Revenus TTC (€)",
          data:revData,
          backgroundColor:revData.map((_,i)=>i===currentMonth?"rgba(212,33,61,.85)":"rgba(255,255,255,.08)"),
          borderColor:revData.map((_,i)=>i===currentMonth?"#D4213D":"rgba(255,255,255,.15)"),
          borderWidth:1,borderRadius:3,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${Math.round(c.raw).toLocaleString("fr-FR")} €`}}},
        scales:{
          x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11}}},
          y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11},callback:v=>`${(v/1000).toFixed(0)}k€`}},
        }
      }
    });
    return()=>{if(revChartInst.current)revChartInst.current.destroy();};
  },[]);

  /* Chart occupation */
  useEffect(()=>{
    if(!occChart.current)return;
    if(occChartInst.current)occChartInst.current.destroy();
    occChartInst.current=new Chart(occChart.current,{
      type:"line",
      data:{
        labels:moisLabels,
        datasets:[{
          label:"Taux d'occupation %",
          data:tauxMensuels,
          borderColor:"#4a9fd4",backgroundColor:"rgba(74,159,212,.08)",
          fill:true,tension:0.4,pointBackgroundColor:tauxMensuels.map((_,i)=>i===currentMonth?"#D4213D":"#4a9fd4"),
          pointRadius:tauxMensuels.map((_,i)=>i===currentMonth?5:3),
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}%`}}},
        scales:{
          x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11}}},
          y:{min:0,max:100,grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#4a5e72",font:{size:11},callback:v=>`${v}%`}},
        }
      }
    });
    return()=>{if(occChartInst.current)occChartInst.current.destroy();};
  },[]);

  /* Chart répartition types */
  useEffect(()=>{
    if(!typeChart.current)return;
    if(typeChartInst.current)typeChartInst.current.destroy();
    typeChartInst.current=new Chart(typeChart.current,{
      type:"doughnut",
      data:{
        labels:Object.keys(typeCount),
        datasets:[{data:Object.values(typeCount),backgroundColor:["rgba(212,33,61,.7)","rgba(74,159,212,.7)","rgba(61,190,122,.7)","rgba(232,160,48,.7)"],borderColor:"rgba(0,0,0,.3)",borderWidth:2}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:"bottom",labels:{color:"#7a8a9a",font:{size:11},padding:10}}},
      }
    });
    return()=>{if(typeChartInst.current)typeChartInst.current.destroy();};
  },[]);

  const kpis=[
    {v:fmtEuro(totalTTC),l:"CA TTC encaissé",c:"#3dbe7a",sub:"Séjours terminés & en cours"},
    {v:`${Math.round(tauxMensuels[currentMonth])}%`,l:"Taux d'occu. mensuel",c:"#D4213D",sub:`${moisLabels[currentMonth]} — base historique`},
    {v:fmtEuro(pmHotel),l:"Revenu moyen / réservation",c:"#4a9fd4",sub:"Hors annulations"},
    {v:revuePremium,l:"Séjours Suite / Prestige",c:"#a07ad4",sub:"Chambres ≥ 199€/nuit"},
  ];

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:16,color:"#dde4ee",fontWeight:600}}>
          Statistiques & Reporting
          <span style={{fontSize:11,color:"#4a5e72",fontWeight:400,marginLeft:10}}>— Accès {user.role}</span>
        </h2>
        <div style={{fontSize:11,color:"#3a5a3a",background:"rgba(61,190,122,.08)",
          border:"1px solid rgba(61,190,122,.2)",borderRadius:4,padding:"4px 10px"}}>
          ↺ Données mises à jour en temps réel
        </div>
      </div>

      {/* KPIs financiers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:18}}>
        {kpis.map(k=>(
          <div key={k.l} style={{background:"rgba(12,22,36,.9)",
            border:`1px solid ${k.c}18`,borderLeft:`3px solid ${k.c}`,borderRadius:6,padding:"14px 16px"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#dde4ee",lineHeight:1.2}}>{k.v}</div>
            <div style={{fontSize:11,color:"#4a5e72",marginTop:2}}>{k.l}</div>
            <div style={{fontSize:10.5,color:k.c,marginTop:1}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Graphiques */}
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14,marginBottom:14}}>
        {/* Revenus */}
        <div style={S.card}>
          <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12,display:"flex",justifyContent:"space-between"}}>
            Revenus mensuels (€ TTC)
            <span style={{fontSize:10,background:"rgba(212,33,61,.12)",color:"#D4213D",padding:"2px 7px",borderRadius:3}}>
              Mois courant : {moisLabels[currentMonth]}
            </span>
          </div>
          <div style={{height:200}}>
            <canvas ref={revChart}/>
          </div>
        </div>
        {/* Répartition chambres */}
        <div style={S.card}>
          <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>
            Répartition par type
          </div>
          <div style={{height:200}}>
            <canvas ref={typeChart}/>
          </div>
        </div>
      </div>

      {/* Taux + Top clients */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 3fr",gap:14}}>
        {/* Taux occupation */}
        <div style={S.card}>
          <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>
            Taux d'occupation — 12 mois
          </div>
          <div style={{height:180}}>
            <canvas ref={occChart}/>
          </div>
        </div>

        {/* Top clients */}
        <div style={S.card}>
          <div style={{fontSize:11,fontWeight:600,color:"#5a6e82",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>
            Top clients — Chiffre d'affaires généré
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["#","Client","Fidélité","Séjours","CA TTC"].map(h=><th key={h} style={{...S.th,fontSize:10}}>{h}</th>)}</tr></thead>
            <tbody>
            {topClients.map((c,i)=>(
              <tr key={c.id}>
                <td style={S.td}>
                  <span style={{fontSize:13,fontWeight:700,color:i===0?"#d4a830":i===1?"#a8a8c0":i===2?"#cd7f32":"#4a5e72"}}>
                    {i+1}
                  </span>
                </td>
                <td style={S.td}><b>{c.nom}</b> {c.prenom}<div style={{fontSize:10,color:"#4a5e72"}}>{c.ville}</div></td>
                <td style={S.td}>{badge(FC[c.fidelite]||"#888",c.fidelite)}</td>
                <td style={S.td}>{c.sejours}</td>
                <td style={S.td}><b style={{color:"#3dbe7a"}}>{fmtEuro(c.totalRevenu)}</b></td>
              </tr>
            ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MODAL — NOUVELLE RÉSERVATION
══════════════════════════════════════════════════════ */
function NewResaModal({clients,chambres,resas,onSave,onClose}){
 const[form,setForm]=useState({clientId:clients[0]?.id||"",chambreId:"",arrivee:fmt(today),depart:fmt(addDays(today,1)),adultes:2,enfants:0,pension:"SA",notes:"",acompte:0,acomptePercent:null});
  const[disponibles,setDisponibles]=useState([]);const[searched,setSearched]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const chercher=()=>{
    const arr=new Date(form.arrivee);const dep=new Date(form.depart);
    const avail=chambres.filter(c=>{
      if(c.statut==="maintenance")return false;
      return!resas.some(r=>{
        if(r.chambreId!==c.id||r.statut==="annulée"||r.statut==="terminée")return false;
        return arr<new Date(r.depart)&&dep>new Date(r.arrivee);
      });
    });
    setDisponibles(avail);setSearched(true);set("chambreId","");
  };
  const n=getNuits(form.arrivee,form.depart);
  const ch=chambres.find(c=>c.id===form.chambreId);
  const pen=PENSIONS.find(p=>p.code===form.pension)||{supp:0};
  const ht=ch&&n>0?(ch.prix+pen.supp*form.adultes)*n:0;
  const ttc=ht*(1+HOTEL.tva);
  const canSave=form.clientId&&form.chambreId&&n>0&&form.acomptePercent!==null;
  return(
    <div style={{background:"#0b1c2e",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:26,width:"min(540px,92vw)"}}>
      <MTitre icon="◷" title="Nouvelle réservation" onClose={onClose}/>
      <div style={{marginBottom:12}}><Lbl>Client *</Lbl>
        <Sel value={form.clientId} onChange={e=>set("clientId",e.target.value)}>
          {clients.map(c=><option key={c.id} value={c.id}>{c.nom} {c.prenom} — {c.ville} ({c.fidelite})</option>)}
        </Sel>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
        <div><Lbl>Arrivée *</Lbl><Inp type="date" value={form.arrivee} min={fmt(today)} onChange={e=>{set("arrivee",e.target.value);setSearched(false);}}/></div>
        <div><Lbl>Départ *</Lbl><Inp type="date" value={form.depart} min={form.arrivee||fmt(today)} onChange={e=>{set("depart",e.target.value);setSearched(false);}}/></div>
      </div>
      {n>0&&<div style={{fontSize:12,color:"#D4213D",marginBottom:12}}>→ {n} nuit(s)</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><Lbl>Adultes</Lbl><Inp type="number" min="1" max="4" value={form.adultes} onChange={e=>set("adultes",+e.target.value)}/></div>
        <div><Lbl>Enfants</Lbl><Inp type="number" min="0" max="4" value={form.enfants} onChange={e=>set("enfants",+e.target.value)}/></div>
      </div>
      <button style={{...S.btnGhost,width:"100%",padding:"9px",marginBottom:12,textAlign:"center",fontSize:12}} onClick={chercher}>🔍 Vérifier les disponibilités</button>
      {searched&&<div style={{marginBottom:12}}>
        <Lbl>Chambre disponible * ({disponibles.length})</Lbl>
        {disponibles.length===0?<p style={{color:"#e05c5c",fontSize:12}}>Aucune chambre disponible pour ces dates.</p>
          :<div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {disponibles.map(c=>(
              <div key={c.id} onClick={()=>set("chambreId",c.id)} style={{
                padding:"7px 12px",borderRadius:5,cursor:"pointer",fontSize:12,
                border:`1px solid ${form.chambreId===c.id?"#D4213D":"rgba(255,255,255,.1)"}`,
                background:form.chambreId===c.id?"rgba(212,33,61,.1)":"rgba(255,255,255,.03)"}}>
                <b style={{color:"#D4213D"}}>{c.id}</b> — {c.type}
                <div style={{fontSize:10,color:"#4a5e72"}}>{c.vue} · {c.prix}€/nuit</div>
              </div>
            ))}
          </div>}
      </div>}
      <div style={{marginBottom:12}}><Lbl>Formule pension</Lbl>
        <Sel value={form.pension} onChange={e=>set("pension",e.target.value)}>
          {PENSIONS.map(p=><option key={p.code} value={p.code}>{p.label}{p.supp>0?` (+${p.supp}€/pers/j)`:""}</option>)}
        </Sel>
      </div>
     <div style={{marginBottom:12}}><Lbl>Notes / Demandes spéciales</Lbl><Inp placeholder="Ex : chambre calme, anniversaire…" value={form.notes} onChange={e=>set("notes",e.target.value)}/></div>
{ch&&ht>0&&<div style={{marginBottom:12}}>
  <Lbl>Acompte à l'encaissement (%)</Lbl>
  <div style={{display:"flex",gap:8,alignItems:"center"}}>
    {[0,20,30,50,100].map(p=>(
      <button key={p} type="button"
        style={{...S.btnGhost,fontSize:11,padding:"4px 10px",
          background:form.acomptePercent===p?"rgba(212,33,61,.12)":"transparent",
          color:form.acomptePercent===p?"#D4213D":"#4a5e72",
          borderColor:form.acomptePercent===p?"rgba(212,33,61,.4)":"rgba(255,255,255,.08)"}}
        onClick={()=>set("acomptePercent",p)}>
        {p===0?"Sans acompte":`${p}%`}
      </button>
    ))}
  </div>
  {form.acomptePercent>0&&<div style={{fontSize:12,color:"#e8a030",marginTop:6}}>
    Acompte : <b>{fmtEuro(ttc*form.acomptePercent/100)}</b> — Solde à l'arrivée : <b>{fmtEuro(ttc*(1-form.acomptePercent/100))}</b>
  </div>}
</div>}
      {ch&&ht>0&&(
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:6,padding:"10px 14px",marginBottom:14,fontSize:12}}>
          <Ligne l={`Hébergement ch. ${ch.id} × ${n}n`} v={`${ch.prix*n}€`}/>
          {pen.supp>0&&<Ligne l={`${pen.label} × ${form.adultes}p × ${n}n`} v={`${pen.supp*form.adultes*n}€`}/>}
          <div style={{borderTop:"1px solid rgba(255,255,255,.06)",marginTop:6,paddingTop:6}}>
            <Ligne l="Total HT" v={`${ht.toFixed(2)}€`}/>
            <Ligne l={`TVA ${(HOTEL.tva*100).toFixed(0)}%`} v={`${(ht*HOTEL.tva).toFixed(2)}€`}/>
            <Ligne l="TOTAL TTC" v={fmtEuro(ttc)} gold/>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.btnGhost} onClick={onClose}>Annuler</button>
        <button style={{...S.btnPrim,opacity:canSave?1:.4}} disabled={!canSave} onClick={()=>canSave&&onSave(form)}>✓ Confirmer</button>
      </div>
    </div>
  );
}

          ))}
        </div>
      </div>
      <div style={{textAlign:"right"}}><button style={S.btnGhost} onClick={onClose}>Fermer</button></div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MODAL — FACTURE
══════════════════════════════════════════════════════ */
function FactureModal({resa,chambre,client,hotel,onClose,onCheckout=null}){
  if(!resa||!chambre||!client)return null;
  const H=hotel||HOTEL;
  const n=getNuits(resa.arrivee,resa.depart);
  const pen=PENSIONS.find(p=>p.code===resa.pension)||{supp:0,label:resa.pension};
  const hebergt=chambre.prix*n;
  const pensTotal=pen.supp*(resa.adultes||1)*n;
  const ht=hebergt+pensTotal;
  const tvaAmt=ht*H.tva;
  const ttc=ht+tvaAmt;
  return(
    <div style={{background:"#0b1c2e",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:30,width:"min(460px,92vw)"}}>
      {/* En-tête */}
      <div style={{textAlign:"center",marginBottom:22,paddingBottom:18,borderBottom:"1px solid rgba(255,255,255,.07)"}}>

        </tbody>
      </table>
      {/* Totaux */}
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:5,padding:"10px 14px",marginBottom:18}}>

          <Ligne l="TOTAL TTC" v={fmtEuro(ttc)} gold/>
        </div>

     {resa.acompte>0&&(
  <div style={{background:"rgba(61,190,122,.06)",border:"1px solid rgba(61,190,122,.2)",borderRadius:6,padding:"10px 14px",marginBottom:14}}>
    <div style={{fontSize:11,fontWeight:600,color:"#3dbe7a",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Règlement</div>
    <Ligne l="Acompte versé à la réservation" v={fmtEuro(resa.acompte)}/>
    <Ligne l="Solde restant dû" v={fmtEuro(ttc-resa.acompte)} bold gold/>
  </div>
)}
{resa.notes&&<div style={{fontSize:11,color:"#4a5e72",marginBottom:14,fontStyle:"italic"}}>Note : {resa.notes}</div>}
      <div style={{fontSize:10.5,color:"#2a3a4a",textAlign:"center",marginBottom:18}}>Merci pour votre séjour au {H.nom} {H.ville} · Paiement à la réception</div>

      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════

                    <td style={S.td}><Inp value={c.prenom} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],prenom:e.target.value};setClientsList(l);}}/></td>

                    <td style={S.td}><Inp value={c.tel} style={{minWidth:110}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],tel:e.target.value};setClientsList(l);}}/></td>
                    <td style={S.td}><Inp value={c.ville} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],ville:e.target.value};setClientsList(l);}}/></td>
                    <td style={S.td}><Inp value={c.pays} style={{minWidth:80}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],pays:e.target.value};setClientsList(l);}}/></td>
                    <td style={S.td}>

                    <td style={S.td}><Inp type="number" min="0" value={c.sejours} style={{width:54}} onChange={e=>{const l=[...clientsList];l[i]={...l[i],sejours:+e.target.value};setClientsList(l);}}/></td>
                    <td style={S.td}><button style={{...S.btnGhost,color:"#e05c5c",fontSize:11,marginRight:0}} onClick={()=>setClientsList(p=>p.filter((_,j)=>j!==i))}>✗</button></td>
                  </tr>
                ))}
                </tbody>
              </table>
              </div>
              <SaveBtn saved={saved==="clients"} onClick={()=>save("clients",clientsList,onUpdateClients)}/>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   RÉCLAMATIONS
══════════════════════════════════════════════════════ */
function Reclamations({resas,clients,getCl,getCh,user,reclamations,setReclamations}){
  const[modal,setModal]=useState(null);

  const TYPES=["Propreté chambre","Bruit / nuisances","Équipements défectueux","Facturation incorrecte","Accueil / service","Restauration","Autre"];
  const URGENCES=[{v:"faible",c:"#3dbe7a",label:"Faible"},{v:"moyenne",c:"#e8a030",label:"Moyenne"},{v:"haute",c:"#e05c5c",label:"Haute"}];

  const addReclamation=data=>{
    const newR={...data,id:`REC${String(reclamations.length+1).padStart(3,"0")}`,
      date:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
      statut:"en cours",auteur:user.nom};
    setReclamations(p=>[newR,...p]);
    setModal(null);
  };

  const resoudre=id=>setReclamations(p=>p.map(r=>r.id===id?{...r,statut:"résolue"}:r));

  const clientsEnSejour=resas.filter(r=>r.statut==="en cours");

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:16,color:"#dde4ee",fontWeight:600}}>
          📢 Réclamations clients
          <span style={{fontSize:11,color:"#4a5e72",fontWeight:400,marginLeft:10}}>— {reclamations.length} réclamation(s)</span>
        </h2>
        <button style={S.btnPrim} onClick={()=>setModal("new")}>+ Nouvelle réclamation</button>
      </div>

      {reclamations.length===0?(
        <div style={{...S.card,textAlign:"center",padding:40}}>
          <div style={{fontSize:32,marginBottom:12}}>✅</div>
          <div style={{fontSize:14,color:"#3dbe7a",fontWeight:600}}>Aucune réclamation en cours</div>
          <div style={{fontSize:12,color:"#4a5e72",marginTop:6}}>Les réclamations clients seront affichées ici</div>
        </div>
      ):(
        <div style={S.card}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["N°","Client","Chambre","Type","Urgence","Heure","Auteur","Statut",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
            {reclamations.map(r=>{
              const cl=getCl(r.clientId);
              const urgence=URGENCES.find(u=>u.v===r.urgence);
              return(<tr key={r.id}>
                <td style={S.td}><code style={{color:"#D4213D",fontSize:11}}>{r.id}</code></td>
                <td style={S.td}><b>{cl?.nom}</b> {cl?.prenom}</td>
                <td style={S.td}><b style={{color:"#D4213D"}}>{r.chambreId}</b></td>
                <td style={S.td}><span style={{fontSize:11}}>{r.type}</span></td>
                <td style={S.td}>{badge(urgence?.c||"#888",urgence?.label||r.urgence)}</td>
                <td style={S.td}><span style={{fontSize:11,color:"#4a5e72"}}>{r.date}</span></td>
                <td style={S.td}><span style={{fontSize:11}}>{r.auteur}</span></td>
                <td style={S.td}>{badge(r.statut==="résolue"?"#3dbe7a":"#e8a030",r.statut)}</td>
                <td style={S.td}>
                  {r.statut==="en cours"&&(
                    <button style={{...S.btnGhost,fontSize:11,color:"#3dbe7a",borderColor:"rgba(61,190,122,.3)"}}
                      onClick={()=>resoudre(r.id)}>✓ Résolue</button>
                  )}
                </td>
              </tr>);
            })}
            </tbody>
          </table>
        </div>
      )}

      {modal==="new"&&(
        <ModalOverlay onClose={()=>setModal(null)}>
          <NouvelleReclamationModal
            clients={clientsEnSejour.map(r=>({...getCl(r.clientId),chambreId:r.chambreId,resaId:r.id}))}
            types={TYPES}
            urgences={URGENCES}
            onSave={addReclamation}
            onClose={()=>setModal(null)}
          />
        </ModalOverlay>
      )}
    </div>
  );
}

function NouvelleReclamationModal({clients,types,urgences,onSave,onClose}){
  const[form,setForm]=useState({clientId:clients[0]?.id||"",chambreId:clients[0]?.chambreId||"",type:types[0],urgence:"moyenne",description:""});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const canSave=form.clientId&&form.type&&form.urgence;

  return(
    <div style={{background:"#0b1c2e",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:26,width:"min(480px,92vw)"}}>
      <MTitre icon="📢" title="Nouvelle réclamation" onClose={onClose}/>

      <div style={{marginBottom:12}}>
        <Lbl>Client concerné *</Lbl>
        <Sel value={form.clientId} onChange={e=>{
          const cl=clients.find(c=>c.id===e.target.value);
          set("clientId",e.target.value);
          set("chambreId",cl?.chambreId||"");
        }}>
          {clients.length===0
            ?<option value="">Aucun client en séjour</option>
            :clients.map(c=><option key={c.id} value={c.id}>{c.nom} {c.prenom} — Ch. {c.chambreId}</option>)
          }
        </Sel>
      </div>

      <div style={{marginBottom:12}}>
        <Lbl>Type de réclamation *</Lbl>
        <Sel value={form.type} onChange={e=>set("type",e.target.value)}>
          {types.map(t=><option key={t}>{t}</option>)}
        </Sel>
      </div>

      <div style={{marginBottom:12}}>
        <Lbl>Niveau d'urgence *</Lbl>
        <div style={{display:"flex",gap:8}}>
          {urgences.map(u=>(
            <button key={u.v} type="button"
              style={{...S.btnGhost,flex:1,fontSize:12,
                background:form.urgence===u.v?`${u.c}18`:"transparent",
                color:form.urgence===u.v?u.c:"#4a5e72",
                borderColor:form.urgence===u.v?`${u.c}50`:"rgba(255,255,255,.08)"}}
              onClick={()=>set("urgence",u.v)}>
              {u.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <Lbl>Description</Lbl>
        <textarea
          value={form.description}
          onChange={e=>set("description",e.target.value)}
          placeholder="Décrivez la réclamation en détail..."
          rows={3}
          style={{...S.input,resize:"vertical",lineHeight:1.6}}
        />
      </div>

      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
       <button style={S.btnGhost} onClick={onClose}>Annuler</button>
        <button style={{...S.btnPrim,opacity:canSave?1:.4}} disabled={!canSave}
          onClick={()=>canSave&&onSave(form)}>
          ✓ Enregistrer
        </button>
      </div>
    </div>
 );
}
function SectionTitle({icon,title}){
return <div style={{fontSize:13,fontWeight:600,color:"#dde4ee",marginBottom:14,display:"flex",alignItems:"center",gap:6}}><span>{icon}</span>{title}</div>;
}
function FG({label,children}){
  return <div style={{marginBottom:0}}><Lbl>{label}</Lbl>{children}</div>;
}
function SaveBtn({onClick,saved}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:16,paddingTop:14,borderTop:"1px solid rgba(255,255,255,.06)"}}>
      <button style={{...S.btnPrim,minWidth:160}} onClick={onClick}>✓ Enregistrer les modifications</button>
      {saved&&<span style={{fontSize:12,color:"#3dbe7a",animation:"fadeIn .2s ease"}}>✓ Modifications appliquées</span>}
    </div>
  );
}

══════════════════════════════════════════════════════ */
function NoteModal({resa,client,chambre,onSave,onClose}){
  const[note,setNote]=useState(resa.notes||"");
  const SUGGESTIONS=[
    "Anniversaire de mariage — préparer cadeau bienvenue",
    "Chambre calme côté jardin souhaitée",
    "Cliente Platine — panier bienvenue + surclassement si disponible",
    "Allergie alimentaire : sans gluten",
    "Bébé — lit bébé à installer avant arrivée",
    "Check-in tardif prévu (après 22h)",
    "Besoin d'une facture au nom de la société",
    "Demande de room service quotidien",
    "Mobilité réduite — chambre accessible PMR",
  ];
  return(
    <div style={{background:"#0b1c2e",border:"1px solid rgba(232,160,48,.25)",
      borderTop:"3px solid #e8a030",borderRadius:10,padding:26,width:"min(480px,92vw)"}}>
      <MTitre icon="⚠️" title="Demande spéciale" onClose={onClose}/>

      {/* Contexte réservation */}
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",
        borderRadius:6,padding:"10px 14px",marginBottom:16,
        display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
        <div>
          <div style={{fontSize:9.5,color:"#4a5e72",marginBottom:2}}>CLIENT</div>
          <div style={{fontWeight:600,color:"#dde4ee"}}>{client?.nom} {client?.prenom}</div>
          <div style={{fontSize:10.5,color:"#4a5e72"}}>{client?.ville} · {badge(FC[client?.fidelite]||"#888",client?.fidelite||"—")}</div>
        </div>
        <div>
          <div style={{fontSize:9.5,color:"#4a5e72",marginBottom:2}}>CHAMBRE</div>
          <div style={{fontWeight:600,color:"#D4213D"}}>{resa.chambreId}</div>
          <div style={{fontSize:10.5,color:"#4a5e72"}}>{chambre?.type}</div>
        </div>
        <div>
          <div style={{fontSize:9.5,color:"#4a5e72",marginBottom:2}}>SÉJOUR</div>
          <div style={{color:"#dde4ee"}}>{fmtDate(resa.arrivee)} → {fmtDate(resa.depart)}</div>
          <div style={{fontSize:10.5,color:"#4a5e72"}}>{getNuits(resa.arrivee,resa.depart)} nuit(s) · {resa.adultes} adulte(s)</div>
        </div>
        <div style={{paddingTop:2}}>
          {badge(SR[resa.statut],resa.statut)}

      </div>

      {/* Champ note */}
      <div style={{marginBottom:12}}>

          value={note}
          onChange={e=>setNote(e.target.value)}

          rows={3}
          style={{...S.input,resize:"vertical",lineHeight:1.6,
            background:"rgba(232,160,48,.04)",
            border:"1px solid rgba(232,160,48,.25)"}}
        />
      </div>

      {/* Suggestions rapides */}
      <div style={{marginBottom:18}}>
        <div style={{fontSize:9.5,color:"#4a5e72",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>
          Suggestions rapides
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {SUGGESTIONS.map(s=>(
            <button key={s}
              onClick={()=>setNote(s)}
              style={{fontSize:10.5,background:"rgba(255,255,255,.04)",
                border:"1px solid rgba(255,255,255,.08)",borderRadius:4,
                padding:"3px 9px",color:"#5a7a8a",cursor:"pointer",
                textAlign:"left"}}>
              {s.length>40?s.slice(0,38)+"…":s}
            </button>
          ))}
          {note&&<button onClick={()=>setNote("")}
            style={{fontSize:10.5,background:"rgba(224,92,92,.07)",
              border:"1px solid rgba(224,92,92,.2)",borderRadius:4,
              padding:"3px 9px",color:"#e05c5c",cursor:"pointer"}}>
            ✗ Effacer
          </button>}
        </div>
      </div>

      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.btnGhost} onClick={onClose}>Annuler</button>
        <button style={S.btnPrim} onClick={()=>onSave(resa.id,note)}>✓ Enregistrer</button>
      </div>
    </div>
  );
}

══════════════════════════════════════════════════════ */
function ModalOverlay({children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-start",
      justifyContent:"center",zIndex:1000,padding:"28px 14px",overflowY:"auto"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      {children}
    </div>
  );
}
function MTitre({icon,title,onClose}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <h3 style={{fontSize:15,color:"#dde4ee",fontWeight:600}}>{icon} {title}</h3>
      <button style={{background:"transparent",border:"none",color:"#4a5e72",fontSize:17,lineHeight:1}} onClick={onClose}>✕</button>
    </div>
  );
}
function Vide({msg}){return <p style={{color:"#2a3a4a",fontSize:12,padding:"10px 0"}}>{msg}</p>;}
function Ligne({l,v,bold,gold}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",fontSize:bold?13:12,
      color:gold?"#3dbe7a":bold?"#dde4ee":"#4a5e72",fontWeight:bold?600:400,marginBottom:3}}>
      <span>{l}</span><span>{v}</span>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   AUTHENTIFICATION FIREBASE
══════════════════════════════════════════════════════ */
function FirebaseLoginScreen({onAuthenticated}){
  const[email,setEmail]=useState("");
  const[mdp,setMdp]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    setErr("");setLoading(true);
    try{
      await firebase.auth().signInWithEmailAndPassword(email,mdp);
      onAuthenticated();
    }catch(e){
      setErr("Identifiant ou mot de passe incorrect.");
      setLoading(false);
    }
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"#06111f",backgroundImage:"radial-gradient(ellipse at 20% 50%,rgba(212,33,61,.08) 0%,transparent 55%)"}}>
      <div style={{width:"min(380px,92vw)",background:"rgba(12,22,36,.98)",
        border:"1px solid rgba(255,255,255,.09)",borderRadius:12,padding:"36px 32px",
        boxShadow:"0 24px 60px rgba(0,0,0,.5)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:32,marginBottom:8}}>🏨</div>
          <div style={{fontSize:11,color:"#5a6e82",textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>
            PMS Pédagogique
          </div>
          <h2 style={{fontSize:17,color:"#dde4ee",fontWeight:600}}>Accès sécurisé</h2>
          <div style={{fontSize:11,color:"#3a5060",marginTop:4}}>Lycée Victor Hugo — Carpentras</div>
        </div>
        <div style={{marginBottom:12}}>
          <Lbl>Email</Lbl>
          <Inp type="email" placeholder="votre@email.fr" value={email}
            onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
            style={{background:"rgba(255,255,255,.04)"}}/>
        </div>
        <div style={{marginBottom:18}}>
          <Lbl>Mot de passe</Lbl>
          <Inp type="password" placeholder="••••••••" value={mdp}
            onChange={e=>setMdp(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
            style={{background:"rgba(255,255,255,.04)"}}/>
        </div>
        {err&&<div style={{fontSize:12,color:"#e05c5c",marginBottom:12,textAlign:"center"}}>{err}</div>}
        <button style={{...S.btnPrim,width:"100%",padding:11,fontSize:13,borderRadius:7,
          opacity:loading?.6:1}}
          onClick={handleLogin} disabled={loading}>
          {loading
            ?<span style={{display:"inline-block",width:14,height:14,border:"2px solid #fff",
                borderTopColor:"transparent",borderRadius:"50%",
                animation:"spin .8s linear infinite",verticalAlign:"middle"}}/>
            :"Se connecter →"}
        </button>
        <div style={{marginTop:20,fontSize:10.5,color:"#1e2e3e",textAlign:"center"}}>
          © {new Date().getFullYear()} Yannick Otto — Lycée Victor Hugo, Carpentras
        </div>
      </div>
    </div>
  );
}

function FirebaseApp(){
  const[fbUser,setFbUser]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    const unsub=firebase.auth().onAuthStateChanged(u=>{
      setFbUser(u);
      setLoading(false);
    });
    return unsub;
  },[]);

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#06111f"}}>
      <div style={{width:24,height:24,border:"3px solid rgba(212,33,61,.3)",
        borderTopColor:"#D4213D",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    </div>
  );

  if(!fbUser)return <FirebaseLoginScreen onAuthenticated={()=>{}}/>;
  return <App/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<FirebaseApp/>);
</script>
